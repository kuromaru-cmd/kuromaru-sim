<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>黒マル式競馬予想シュミレーター (Public Edition)</title>
    <meta name="description" content="AI分析データを用いた次世代競馬予想シミュレーター。当日のトラックバイアスや展開を自由に変更して、あらゆる「激走シナリオ」を検証。">
    <meta property="og:title" content="黒マル式競馬予想シュミレーター">
    <meta property="og:description" content="AIデータ×展開シミュレーションで真の期待値を見抜く。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kuromaru-cmd.github.io/kuromaru-sim/">
    <meta name="twitter:card" content="summary">

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .neon-border { box-shadow: 0 0 8px rgba(6, 182, 212, 0.5); }
        .neon-border-active { box-shadow: 0 0 10px rgba(34, 211, 238, 0.8); border-color: #22d3ee !important; }
        .neon-border-gold { box-shadow: 0 0 8px rgba(202, 138, 4, 0.3); border-color: rgba(202, 138, 4, 0.6) !important; }
        .neon-text-cyan { text-shadow: 0 0 10px rgba(34, 211, 238, 0.6); }
        .neon-text-alert { text-shadow: 0 0 10px rgba(244, 63, 94, 0.8); }
        .neon-text-magic { text-shadow: 0 0 10px rgba(167, 139, 250, 0.8); }
        select { background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%2322d3ee' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E"); background-position: right .5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-4 font-mono min-h-screen relative">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const API_URL = "https://script.google.com/macros/s/AKfycbxV0f-VF_lw-FQjQ1S2WFUh06QkBRuST8z1SkqFNZ9xwYIGytG6DdCZ2qjVKYAxvxI5/exec";

        const AI_PROMPT = `「血統・コース適性専門AI」「展開・戦術専門AI」「状態・メンタル専門AI」が作成した3つのレポートを入力します。
あなたの任務は、これらの非構造化データを統合し、推測やハルシネーションを一切排除して、指定されたJSONフォーマットに変換することです。

⚠️【ハルシネーション防止の絶対原則：厳守事項】
1. 内部記憶の完全遮断：本タスクにおいては、AIが持つ過去の競馬の知識（過去の同名レースの結果など）の参照を完全に禁止します。
2. ドキュメント絶対主義：出力するすべてのデータは、必ず「提供された3つのレポート」の中に明記されているもののみを使用してください。
3. 出力前クロスチェック：JSONを出力する直前に、生成したデータが「レポート内の事実」と完全に一致しているか内部で必ず確認してください。

【ステップ1：事実の抽出と競合解決（中間推論）】
まず、3つのレポートから各馬のデータを箇条書きで抽出してください。その際、レポート間で情報が競合している場合は、以下の「裁定ルール」に厳格に従って解決してください。
・「ペース、展開、ポジション、トラックバイアス」に関する競合 ＝ 【展開・戦術専門AI】を絶対優先。
・「状態、勝負気配、馬体重、精神的自滅リスク（MDF）」に関する競合 ＝ 【状態・メンタル専門AI】を絶対優先。
・「血統、過去の適性」に関する競合 ＝ 【血統・コース適性専門AI】を絶対優先。

【ステップ2：エビデンスの確認とUnknown処理】
抽出した情報の中に、出力すべきJSONの項目を満たすデータが存在しない場合、絶対に推測で補完せず、すべて "Unknown" （数値の場合は null または 0）に置き換えてください。

【ステップ3：Minified JSONの生成】
確定した「事実のみ」を使用して、最終的なJSONデータを生成してください。必ず \`\`\`json と \`\`\` のコードブロックで囲んで出力してください。

■JSONスキーマ（Ver 5.0）
{"race":{"updatedAt":"YYYY/MM/DD","date":"YYYY/MM/DD","raceName":"レース名","location":"場名","courseName":"コース","raceType":"older/3yo","course":1(小)/2(中)/3(大),"weather":"sunny/cloudy/rainy","bias":1-5,"pace":1-3,"cond":1-3,"version":"5.0"},"horses":[{"no":1,"name":"馬名","frame":1,"runStyle":1-4,"odds":0.0,"baseScore":0-100,"load":58.0,"mdf":0-3,"optBias":1-5,"optPace":1-3,"optCond":1-3,"optCourse":1-3,"spurt":1-5,"jockeyName":"氏名","jockeyClass":"S/A/B","specialJockey":true/false,"popularity":1-18,"weight":500,"weightDiff":0,"isTransport":true/false,"pedigreeApt":"S/A/B","tags":["タグ1"],"isMarked":true}]}`;

        const NativeRadarChart = ({ data }) => {
            const size = 220;
            const cx = size / 2;
            const cy = size / 2;
            const maxRadius = 70;
            const getPoint = (value, index, radiusObj = maxRadius) => {
                const angle = -Math.PI / 2 + (Math.PI * 2 * index) / 5;
                const r = radiusObj * ((value || 0) / 100);
                return `${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`;
            };
            const bgLevels = [100, 80, 60, 40, 20];
            const dataPolygon = data.map((d, i) => getPoint(d.A, i)).join(' ');
            return (
                <svg width="100%" height="100%" viewBox={`0 0 ${size} ${size}`} className="overflow-visible">
                    {bgLevels.map(level => (
                        <polygon key={level} points={[0,1,2,3,4].map(i => getPoint(level, i)).join(' ')} fill="none" stroke="#334155" strokeWidth="1" />
                    ))}
                    {[0,1,2,3,4].map(i => {
                        const pt = getPoint(100, i).split(',');
                        return <line key={i} x1={cx} y1={cy} x2={pt[0]} y2={pt[1]} stroke="#334155" strokeWidth="1" />
                    })}
                    <polygon points={dataPolygon} fill="rgba(34, 211, 238, 0.4)" stroke="#22d3ee" strokeWidth="2" />
                    {data.map((d, i) => {
                        const pt = getPoint(100, i, maxRadius + 22).split(',');
                        return <text key={i} x={pt[0]} y={pt[1]} fill="#94a3b8" fontSize="10" textAnchor="middle" dominantBaseline="middle" fontWeight="bold">{d.subject}</text>
                    })}
                </svg>
            );
        };

        const getPaceText = (v) => v === 1 ? "ドスロー" : v === 2 ? "ミドル" : "ハイペース";
        const getCondText = (v) => v === 1 ? "高速(良)" : v === 2 ? "標準(稍重)" : "タフ(重不)";
        const getBiasText = (v) => v === 1 ? "超イン" : v === 2 ? "イン有利" : v === 3 ? "フラット" : v === 4 ? "外伸び" : "大外差し";

        function App() {
            const ODDS_API_URL = "https://script.google.com/macros/s/AKfycbxuZiyB_2BSGaBMagz_9CVvJfKTYz5dGnW9CCAKKgr5S2I-5XT3YTQgJc3yRyGeDdw8/exec";
            const [isFetchingOdds, setIsFetchingOdds] = React.useState(false);

            const [allRacesData, setAllRacesData] = useState([]);
            const [currentRaceIndex, setCurrentRaceIndex] = useState(0);
            const [horses, setHorses] = useState([]);
            const [raceInfo, setRaceInfo] = useState({ date: "読込中...", raceName: "データ取得中", location: "-", courseName: "-", updatedAt: "----/--/--" });
            const [originalSettings, setOriginalSettings] = useState(null);
            
            const [weather, setWeather] = useState('sunny');
            const [bias, setBias] = useState(3);
            const [pace, setPace] = useState(2);
            const [cond, setCond] = useState(2);
            const [course, setCourse] = useState(3);
            const [raceType, setRaceType] = useState('older');
            const [weatherRecovery, setWeatherRecovery] = useState(false);
            const [selectedHorseId, setSelectedHorseId] = useState(null);
            
            const [manualWeightDiffs, setManualWeightDiffs] = useState({});
            
            const [customPredictions, setCustomPredictions] = useState([null, null, null, null, null]);
            const [isCustomPrediction, setIsCustomPrediction] = useState(false);

            const [isLoading, setIsLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [copyStatus, setCopyStatus] = useState('');

            const loadRaceData = (parsedData) => {
                if (!parsedData || !parsedData.race || !parsedData.horses) return;

                setHorses(parsedData.horses);
                setRaceInfo({ 
                    date: parsedData.race.date || "-", 
                    raceName: parsedData.race.raceName || "未設定", 
                    location: parsedData.race.location || "-", 
                    courseName: parsedData.race.courseName || "-",
                    updatedAt: parsedData.race.updatedAt || "----/--/--"
                });
                
                const aiRaceType = parsedData.race.raceType || 'older';
                const aiCourse = Number(parsedData.race.course) || 3;
                const aiWeather = parsedData.race.weather || 'sunny';
                const aiBias = Number(parsedData.race.bias) || 3;
                const aiPace = Number(parsedData.race.pace) || 2;
                const aiCond = Number(parsedData.race.cond) || 2;

                setRaceType(aiRaceType);
                setCourse(aiCourse);
                setWeather(aiWeather); 
                setBias(aiBias); 
                setPace(aiPace); 
                setCond(aiCond);
                
                setOriginalSettings({ weather: aiWeather, bias: aiBias, pace: aiPace, cond: aiCond });
                setWeatherRecovery(false); 
                setSelectedHorseId(null);
                setManualWeightDiffs({});
                setIsCustomPrediction(false); 
            };

            useEffect(() => {
                fetch(API_URL)
                    .then(response => response.json())
                    .then(parsedData => {
                        let validRaces = [];
                        if (Array.isArray(parsedData)) {
                            validRaces = parsedData.filter(d => d && d.race && d.horses && Array.isArray(d.horses));
                        } else if (parsedData && parsedData.race && parsedData.horses && Array.isArray(parsedData.horses)) {
                            validRaces = [parsedData];
                        }

                        if (validRaces.length > 0) {
                            setAllRacesData(validRaces); 
                            loadRaceData(validRaces[0]); 
                            setIsLoading(false);
                        } else {
                            setErrorMsg("スプレッドシートのデータ形式が正しくありません。"); 
                            setIsLoading(false);
                        }
                    })
                    .catch(() => { 
                        setErrorMsg("データベースへの通信に失敗しました。"); 
                        setIsLoading(false); 
                    });
            }, []);

            const handleRaceChange = (e) => {
                const newIndex = Number(e.target.value);
                setCurrentRaceIndex(newIndex);
                loadRaceData(allRacesData[newIndex]);
            };

            const handleWeatherChange = (newWeather) => {
                setWeather(newWeather);
                if (newWeather === 'rainy') setCond(3);
                else if (newWeather === 'cloudy') setCond(2);
                else if (newWeather === 'sunny') { setCond(1); setWeatherRecovery(false); }
            };

            const toggleWeight = (horseNo, val) => {
                setManualWeightDiffs(prev => {
                    if (prev[horseNo] === val) {
                        const newState = { ...prev };
                        delete newState[horseNo];
                        return newState;
                    } else {
                        return { ...prev, [horseNo]: val };
                    }
                });
            };

            const resetToAI = () => {
                if (originalSettings) {
                    setWeather(originalSettings.weather); setBias(originalSettings.bias);
                    setPace(originalSettings.pace); setCond(originalSettings.cond); setWeatherRecovery(false);
                    setManualWeightDiffs({});
                }
            };

            const getRecoveredBias = (currentCourse) => {
                if (currentCourse === 1) return 1;
                if (currentCourse === 2) return 2;
                if (currentCourse === 3) return 4;
                return 3;
            };

            const fetchLatestOdds = async () => {
                setIsFetchingOdds(true);
                try {
                    const response = await fetch(ODDS_API_URL);
                    const result = await response.json();
                    if (result.status === "success" && result.data) {
                        const updatedHorses = horses.map(horse => {
                            const fetchedHorse = result.data.find(d => d.no === horse.no);
                            return fetchedHorse ? { ...horse, odds: fetchedHorse.odds } : horse;
                        });
                        setHorses(updatedHorses);
                        alert("最新のオッズを読み込みました！");
                    } else {
                        alert("データの取得に失敗しました。");
                    }
                } catch (error) {
                    console.error("Odds fetch error:", error);
                    alert("API通信エラーが発生しました。");
                } finally {
                    setIsFetchingOdds(false);
                }
            };

            const calculatedHorses = useMemo(() => {
                const effectiveBias = weatherRecovery ? getRecoveredBias(course) : bias;
                const result = horses.map(horse => {
                    let score = horse.baseScore || 0;
                    const baseScoreRef = horse.baseScore || 0;
                    let alerts = [];
                    let biasDiff = Math.abs((horse.optBias || 3) - effectiveBias);
                    const isMagicJockey = horse.jockeyClass === 'S' || horse.specialJockey === true;
                    const currentWeightDiff = manualWeightDiffs[horse.no] !== undefined ? manualWeightDiffs[horse.no] : (horse.weightDiff || 0);

                    // ==========================================
                    // OMEGA 4.7 物理・空間法則プロトコル
                    // ==========================================
                    
                    // MDF（精神的自滅リスク）の処理
                    let effectiveSpurt = horse.spurt || 3;
                    if (horse.mdf >= 2) {
                        effectiveSpurt = Math.max(1, effectiveSpurt - 2);
                        alerts.push({ text: "📉 MDF警告: 精神的自滅による失速リスク大", type: "danger" });
                    }

                    // 騎手手腕と天候補正
                    if (weather === 'sunny' && cond === 1 && horse.frame >= 8) { biasDiff *= 0.5; alerts.push({ text: "☀️ 天候連動: 外枠不利を軽減", type: "magic" }); }
                    if (isMagicJockey && biasDiff > 1) { biasDiff = 1; alerts.push({ text: "✨ 上位騎手の手腕: バイアス不利無効化", type: "magic" }); }
                    
                    // OMEGA 3.0 / 4.4 展開支配系
                    if (pace === 1 && horse.runStyle === 1) {
                        score += 15;
                        alerts.push({ text: "🏎️ 展開有利: 単騎スロー逃げ", type: "magic" });
                    }
                    if (effectiveBias === 1 && horse.frame <= 4 && (horse.jockeyClass === 'S' || horse.jockeyClass === 'A')) {
                        biasDiff *= 0.5;
                        alerts.push({ text: "🛡️ 騎手手腕: トラックバイアス不利を相殺", type: "warning" });
                    }
                    if (pace === 3 && horse.runStyle <= 2 && horse.jockeyClass === 'S') {
                        score += 20;
                        alerts.push({ text: "✨ S級ペース支配: 激流予測を覆す前残り", type: "magic" });
                    }

                    // OMEGA 4.1-4.3 展開伏兵系
                    if (effectiveBias <= 2 && pace === 3 && baseScoreRef <= 60 && horse.runStyle >= 3) {
                        score += 25; alerts.push({ text: "🃏 展開有利: 枠不問のイン突き伏兵", type: "warning" });
                    }
                    if (effectiveBias >= 4 && pace === 3 && baseScoreRef <= 65 && horse.runStyle >= 3) {
                        score += 20; alerts.push({ text: "🌪️ 展開有利: 展開待ちの大外強襲伏兵", type: "warning" });
                    }
                    if (pace === 1 && baseScoreRef <= 60 && horse.runStyle <= 2) {
                        score += 25; alerts.push({ text: "🐢 展開有利: バイアスを無効化する前残り伏兵", type: "warning" });
                    }

                    // OMEGA 4.5: レコード馬場の罠
                    if (cond === 1 && effectiveBias <= 2 && horse.popularity <= 3) {
                        const hasInnerApt = Array.isArray(horse.tags) && horse.tags.some(t => t.includes("内枠・先行適性◎"));
                        if (!hasInnerApt) {
                            score -= 15; alerts.push({ text: "💣 物理的限界: レコード馬場の内前絶対バイアスに非合致", type: "danger" });
                        }
                    }

                    // OMEGA 4.6: 小回りの遠心力の罠
                    if (course === 1 && pace === 3 && horse.runStyle >= 3) {
                        score -= 10; alerts.push({ text: "📉 遠心力の罠: 小回り激流での外回しロス確定", type: "danger" });
                    }

                    // ------------------------------------------

                    // 適性スコア加算
                    score += (4 - biasDiff) * 3;
                    score += (2 - Math.abs((horse.optPace || 2) - pace)) * 5;
                    score += (2 - Math.abs((horse.optCond || 2) - cond)) * 5;
                    score += (2 - Math.abs((horse.optCourse || 3) - course)) * 4;
                    
                    if (raceType === '3yo' && pace === 1) {
                        if (horse.popularity === 1) {
                            if (isMagicJockey) { alerts.push({ text: "✨ 上位騎手の手腕 (スローペース懸念相殺)", type: "magic" }); score += 15; } 
                            else { alerts.push({ text: "💣 危険: 若駒の折り合い難リスク", type: "danger" }); score -= 30; }
                        } else if (isMagicJockey) { alerts.push({ text: "✨ 上位騎手の手腕 (スタミナ温存)", type: "magic" }); score += 10; }
                    } else if (pace === 1 && isMagicJockey) { alerts.push({ text: "✨ 上位騎手の手腕 (展開支配)", type: "magic" }); score += 10; }
                    
                    // 馬体重増減と相対的質量のハック
                    if (currentWeightDiff <= -10) {
                        if (effectiveBias <= 2 && horse.frame <= 3) {
                            alerts.push({ text: "🛡️ 馬体減不安を相殺: 最内ロスなしの恩恵", type: "magic" });
                        } else if (isMagicJockey) { 
                            alerts.push({ text: "✨ -10kg超: 究極仕上げ (上位騎手でカバー)", type: "magic" }); score += 5; 
                        } else if (horse.weight >= 500) {
                            alerts.push({ text: "✨ -10kg超: 大型馬の究極仕上げ (相対的質量ハック)", type: "magic" }); score += 10;
                        } else if (horse.isTransport) { 
                            alerts.push({ text: "⚠️ -10kg超: 長距離輸送による想定減 (許容範囲)", type: "warning" }); score -= 5; 
                        } else { 
                            alerts.push({ text: "🚨 -10kg超: 輸送なしでの大幅減 (肉体の枯渇・危険)", type: "danger" }); score -= 15; 
                        }
                    } else if (currentWeightDiff >= 10) {
                        if (raceType === '3yo') { alerts.push({ text: "✨ +10kg超: 成長分 (骨格・パワーの増強)", type: "magic" }); score += 5; } 
                        else if (cond === 3) { alerts.push({ text: "💪 +10kg超: 重馬場適合のパワー装甲", type: "magic" }); score += 5; } 
                        else { alerts.push({ text: "💣 +10kg超: 太め残りの危険性あり", type: "danger" }); score -= 10; }
                    }
                    
                    // タグ補正 ＆ 持続力ハック
                    let processedTags = [];
                    if (Array.isArray(horse.tags)) {
                        processedTags = horse.tags.map(t => {
                            if (t.includes("インベタ")) return "内枠・先行適性◎";
                            if (t.includes("ジョーカー")) return "ハイペース消耗戦適性◎";
                            return t;
                        });
                        processedTags = [...new Set(processedTags)]; 
                        if (processedTags.includes("内枠・先行適性◎") && effectiveBias <= 2 && pace === 1) { score += 20; alerts.push({ text: "🚨 イン前優位条件に完全合致", type: "danger" }); }
                        if (processedTags.includes("ハイペース消耗戦適性◎") && pace === 3) { score += 20; alerts.push({ text: "🚨 厳しい消耗戦で能力全開", type: "warning" }); }

                        const hasMomareYowasa = processedTags.some(t => t.includes("揉まれ弱さ"));
                        if (hasMomareYowasa && (horse.jockeyClass === 'S' || horse.jockeyClass === 'A')) {
                            score += 15; alerts.push({ text: "✨ 上位騎手: 揉まれ弱さをカバーする極端戦法", type: "magic" });
                        } else if (hasMomareYowasa) {
                            score -= 10; alerts.push({ text: "⚠️ 弱点露呈: 揉まれ弱さによる後退リスク", type: "danger" });
                        }
                    }

                    if (pace === 3 && effectiveSpurt >= 4) {
                        score += 15;
                        const hasStaminaTag = processedTags.some(t => t.includes("瞬発力") || t.includes("底力") || t.includes("持続力") || t.includes("タフ"));
                        if (hasStaminaTag) score += 10;
                        alerts.push({ text: "🌪️ 展開有利: 激流サバイバル適合の伏兵", type: "warning" });
                    }

                    if (horse.pedigreeApt === 'S') {
                        score += (baseScoreRef < 70 ? 10 : 5); alerts.push({ text: "🧬 特注血統: 舞台適性S (能力最大化)", type: "magic" });
                    } else if (horse.pedigreeApt === 'A') {
                        score += (baseScoreRef < 70 ? 5 : 2); alerts.push({ text: "🧬 血統適合: 舞台適性A", type: "warning" });
                    }
                    
                    score = Math.max(0, Math.round(score));
                    return { ...horse, tags: processedTags, score, alerts, isMagicJockey, effectiveSpurt };
                });

                let sorted = result.sort((a, b) => b.score - a.score);
                let currentRank = 1; let previousScore = -1;
                return sorted.map((horse, index) => {
                    if (horse.score !== previousScore) currentRank = index + 1;
                    previousScore = horse.score;
                    return { ...horse, rank: currentRank };
                });
            }, [horses, weather, bias, pace, cond, course, raceType, weatherRecovery, manualWeightDiffs]);

            const turbulenceLevel = useMemo(() => {
                const topFavorites = calculatedHorses.filter(h => h.popularity <= 3);
                const hasVulnerableFavorites = topFavorites.some(h => h.alerts.some(a => a.type === 'danger') || h.score < 100);
                const isExtremeEnvironment = pace !== 2 || cond === 3;
                if (hasVulnerableFavorites && isExtremeEnvironment) return 'HIGH';
                if (hasVulnerableFavorites || isExtremeEnvironment) return 'MEDIUM';
                return 'LOW';
            }, [calculatedHorses, pace, cond]);

            const darkHorses = useMemo(() => {
                let candidates = calculatedHorses.filter(h => h.alerts.some(a => a.text.includes("伏兵")));
                if (turbulenceLevel === 'LOW') candidates = candidates.filter(h => h.score >= 90);
                else if (turbulenceLevel === 'MEDIUM') candidates = candidates.filter(h => h.score >= 60);
                const sortedCandidates = candidates.map(h => ({ ...h, valueIndex: h.score * (h.odds || 0) })).sort((a, b) => b.valueIndex - a.valueIndex);
                return sortedCandidates.slice(0, 2);
            }, [calculatedHorses, turbulenceLevel]);

            useEffect(() => {
                if (!isCustomPrediction && calculatedHorses.length >= 4) {
                    const top4 = calculatedHorses.slice(0, 4).map(h => h.no);
                    let starVal = '';
                    if (darkHorses.length > 0) starVal = darkHorses[0].no;
                    else if (calculatedHorses.length >= 5) starVal = calculatedHorses[4].no;
                    setCustomPredictions([...top4, starVal]);
                }
            }, [calculatedHorses, isCustomPrediction, darkHorses]);

            const handleCustomPredictionChange = (index, value) => {
                setIsCustomPrediction(true);
                const newPredictions = [...customPredictions];
                newPredictions[index] = Number(value);
                setCustomPredictions(newPredictions);
            };

            const resetCustomPrediction = () => setIsCustomPrediction(false);

            useEffect(() => {
                if (calculatedHorses.length > 0 && selectedHorseId === null) setSelectedHorseId(calculatedHorses[0].no);
            }, [calculatedHorses, selectedHorseId]);

            const selectedHorseData = useMemo(() => {
                if (!selectedHorseId) return null;
                return calculatedHorses.find(h => h.no === selectedHorseId) || null;
            }, [selectedHorseId, calculatedHorses]);

            const radarData = useMemo(() => {
                if (!selectedHorseData) return [];
                return [
                    { subject: 'バイアス適性', A: (selectedHorseData.optBias === 3 ? 100 : selectedHorseData.optBias === 4 || selectedHorseData.optBias === 2 ? 80 : 60) },
                    { subject: 'ペース適性', A: ((selectedHorseData.optPace || 2) * 33) },
                    { subject: '馬場適性', A: ((selectedHorseData.optCond || 2) * 33) },
                    { subject: 'コース適性', A: ((selectedHorseData.optCourse || 3) * 33) },
                    { subject: '上がり持続力', A: ((selectedHorseData.effectiveSpurt || 3) * 20) }
                ];
            }, [selectedHorseData]);

            const shareToX = () => {
                const weatherIcon = weather === 'rainy' ? '☔' : weather === 'cloudy' ? '☁️' : '☀️';
                const marks = ['◎', '◯', '▲', '△', '☆'];
                const url = window.location.href;
                const getTwitterLength = (str) => {
                    let len = 0;
                    for (let i = 0; i < str.length; i++) len += str[i].match(/[ -~]/) ? 1 : 2;
                    return len;
                };
                const generateText = (includeScore, includeFrame) => {
                    let t = `【${raceInfo.raceName} 予想】\n`;
                    if (!isCustomPrediction) t += `${weatherIcon}${getPaceText(pace)}・${getCondText(cond)} 想定\n\n`; else t += `\n`;
                    customPredictions.forEach((horseNo, idx) => {
                        if (!horseNo) return;
                        const h = horses.find(h => h.no === horseNo);
                        if (h) {
                            const frameText = includeFrame ? `[${h.frame}枠${h.no}番] ` : "";
                            const scoreText = includeScore ? ` (スコア:${h.score})` : "";
                            t += `${marks[idx]} ${frameText}${h.name}${scoreText}\n`;
                        }
                    });
                    t += `\n🛡️ 推奨盾(リスク回避): ◎◯▲△の馬連/ワイドBOX等\n`;
                    t += `#黒マル式競馬予想シュミレーター\n`;
                    return t;
                };
                let text = generateText(true, true);
                if (getTwitterLength(text) > 250 && !isCustomPrediction) text = generateText(false, true);
                if (getTwitterLength(text) > 250) text = generateText(false, false);
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
            };

            const handleCopyPrompt = () => {
                navigator.clipboard.writeText(AI_PROMPT).then(() => {
                    setCopyStatus('✅ コピー完了'); setTimeout(() => setCopyStatus(''), 2500);
                }).catch(() => setCopyStatus('❌ 失敗'));
            };

            if (isLoading) return <div className="min-h-screen flex items-center justify-center bg-slate-950 flex-col text-cyan-400 font-bold tracking-widest animate-pulse"><div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>CONNECTING...</div>;
            if (errorMsg) return <div className="min-h-screen flex items-center justify-center bg-slate-950 p-4"><div className="bg-slate-900 border border-rose-500 p-6 rounded-lg text-center"><h2 className="text-2xl font-bold text-rose-500 mb-2">通信エラー</h2><p className="text-slate-300">{errorMsg}</p></div></div>;

            const displayDate = typeof raceInfo.date === 'string' ? raceInfo.date.replace(/-/g, '/') : "----/--/--";

            return (
                <div className="max-w-5xl mx-auto bg-slate-900 p-3 md:p-6 rounded-xl shadow-2xl border border-slate-800 relative mt-4 mb-12 pb-12">
                    <header className="mb-4">
                        <div className="flex flex-col md:flex-row md:justify-between md:items-end gap-3">
                            <h1 className="text-lg sm:text-xl md:text-3xl font-black text-cyan-400 tracking-wider neon-text-cyan flex flex-wrap items-center gap-2">
                                <span>🐴 黒マル式競馬予想シュミレーター</span>
                                <span className="text-[10px] md:text-xs text-slate-500 border border-slate-600 px-2 py-0.5 rounded font-normal">公開版 Ver 5.0</span>
                            </h1>
                            <div className="inline-flex items-center">
                                <span className="bg-slate-800 text-emerald-400 border border-emerald-700/50 px-3 py-1.5 rounded text-xs font-bold shadow-inner">🔄 データ更新日：{raceInfo.updatedAt}</span>
                            </div>
                        </div>
                    </header>

                    {allRacesData.length > 1 && (
                        <div className="mb-4 bg-slate-950 border border-slate-700 p-3 rounded-lg flex flex-wrap items-center gap-3 shadow-inner">
                            <span className="text-xl">🏇</span>
                            <label className="text-sm text-slate-300 font-bold">対象レース選択:</label>
                            <select value={currentRaceIndex} onChange={handleRaceChange} className="flex-grow bg-slate-800 text-cyan-300 text-base font-bold border border-cyan-700 rounded p-2 outline-none cursor-pointer neon-border">
                                {allRacesData.map((data, idx) => (<option key={idx} value={idx}>{data?.race?.raceName || '不明'} ({data?.race?.location || '-'})</option>))}
                            </select>
                        </div>
                    )}

                    <div className="bg-slate-950 border border-cyan-700 p-3 md:p-4 rounded-lg mb-6 flex flex-wrap gap-3 items-center neon-border">
                        <div className="bg-slate-800 border border-cyan-500/50 px-3 py-1 rounded-md text-base md:text-xl font-black text-cyan-300 shadow-inner">{raceInfo.raceName}</div>
                        <div className="bg-slate-800 px-3 py-1 rounded text-cyan-400 text-sm font-bold flex items-center shrink-0"><span className="text-[10px] text-slate-200 font-normal mr-1">開催日:</span>{displayDate}</div>
                        <div className="bg-slate-700 px-3 py-1 rounded text-xs text-slate-200 shrink-0">{raceInfo.location} {raceInfo.courseName}</div>
                        <div className="bg-slate-800 border border-slate-600 px-3 py-1 rounded text-[10px] md:text-xs text-slate-300 flex items-center shrink-0">条件: {raceType === '3yo' ? "3歳若駒戦" : "古馬・標準G1"}</div>
                    </div>

                    <div className="mb-6 bg-slate-950 p-4 rounded-lg border border-cyan-900 relative overflow-hidden min-h-[260px] flex flex-col">
                        <h3 className="text-emerald-400 font-bold border-b border-slate-800 pb-2 mb-4 text-sm flex items-center">
                            📊 詳細データ解析
                            {selectedHorseData && <span className="ml-3 text-cyan-300 font-black">{selectedHorseData.frame}枠{selectedHorseId}番 {selectedHorseData.name}</span>}
                        </h3>
                        {selectedHorseData && (
                            <div className="flex flex-col md:flex-row gap-6 items-center">
                                <div className="w-full md:w-1/2 flex justify-center items-center" style={{ minHeight: "220px" }}><NativeRadarChart data={radarData} /></div>
                                <div className="w-full md:w-1/2 text-sm text-slate-300 flex flex-col justify-center">
                                    <div className="grid grid-cols-2 gap-3 mb-3">
                                        <div className="bg-slate-900 p-2 rounded border border-slate-800"><div className="text-[10px] text-slate-500">適合スコア</div><div className="text-3xl font-black text-cyan-400 neon-text-cyan">{selectedHorseData.score}</div></div>
                                        <div className="bg-slate-900 p-2 rounded border border-slate-800"><div className="text-[10px] text-slate-500">基礎能力 (Base)</div><div className="text-2xl font-bold text-white">{selectedHorseData.baseScore}</div></div>
                                    </div>
                                    <ul className="space-y-1 text-xs mb-2 border-b border-slate-800 pb-2">
                                        <li className="flex justify-between pb-1"><span>上がりポテンシャル</span><span className="text-white font-bold">{selectedHorseData.effectiveSpurt >= 4 ? '瞬発力型' : '消耗戦型'} (Lv.{selectedHorseData.effectiveSpurt})</span></li>
                                        <li className="flex justify-between pb-1"><span>斤量 / 精神リスク</span><span className="text-white font-bold">{selectedHorseData.load || '-'}kg / MDF:{selectedHorseData.mdf || 0}</span></li>
                                        <li className="flex justify-between pb-1"><span>想定脚質 / 騎手</span><span className="text-white font-bold">{['不明','逃げ','先行','差し','追込'][selectedHorseData.runStyle] || '自在'} / {selectedHorseData.jockeyName || '未定'}</span></li>
                                        <li className="flex justify-between pb-1"><span>血統適性</span><span className={`font-bold ${selectedHorseData.pedigreeApt === 'S' ? 'text-yellow-400' : selectedHorseData.pedigreeApt === 'A' ? 'text-emerald-400' : 'text-slate-300'}`}>{selectedHorseData.pedigreeApt ? `評価 ${selectedHorseData.pedigreeApt}` : '-'}</span></li>
                                    </ul>
                                    <div className="mt-2 p-2 bg-slate-800/60 border border-slate-700 rounded text-[11px]">
                                        <div className="text-emerald-400 font-bold mb-1 flex items-center text-[10px]">💡 激走シナリオ（能力最大化条件）</div>
                                        <div className="grid grid-cols-3 gap-1 text-center text-[10px]">
                                            <div className="bg-slate-900 py-1 rounded border border-slate-700/50"><span className="text-slate-500 block text-[8px]">ペース</span><span className="text-slate-200 font-bold">{getPaceText(selectedHorseData.optPace || 2)}</span></div>
                                            <div className="bg-slate-900 py-1 rounded border border-slate-700/50"><span className="text-slate-500 block text-[8px]">馬場</span><span className="text-slate-200 font-bold">{getCondText(selectedHorseData.optCond || 2)}</span></div>
                                            <div className="bg-slate-900 py-1 rounded border border-slate-700/50"><span className="text-slate-500 block text-[8px]">バイアス</span><span className="text-slate-200 font-bold">{getBiasText(selectedHorseData.optBias || 3)}</span></div>
                                        </div>
                                    </div>
                                    <div className="flex flex-wrap gap-1 mt-2">
                                        {selectedHorseData.isTransport && <span className="text-[10px] bg-slate-800 border border-slate-600 text-slate-300 px-2 py-0.5 rounded shadow-sm">✈️ 長距離輸送あり</span>}
                                        {Array.isArray(selectedHorseData.tags) && selectedHorseData.tags.map((tag, i) => (<span key={i} className="text-[10px] bg-cyan-900/30 border border-cyan-700/50 text-cyan-200 px-2 py-0.5 rounded">🏷️ {tag}</span>))}
                                    </div>
                                    {Array.isArray(selectedHorseData.alerts) && selectedHorseData.alerts.length > 0 && (<div className="mt-2 pt-2 border-t border-slate-700/50 flex flex-col gap-1">{selectedHorseData.alerts.map((alert, i) => (
                                        <div key={i} className={`text-[11px] font-bold ${alert.type === 'magic' ? 'text-purple-400 neon-text-magic' : ''} ${alert.type === 'danger' ? 'text-rose-500 neon-text-alert animate-pulse' : ''} ${alert.type === 'warning' ? 'text-amber-500' : ''}`}>{alert.text}</div>
                                    ))}</div>)}
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-slate-950 p-4 rounded-lg border border-rose-900 neon-border-alert relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-rose-600"></div>
                                <h3 className="text-rose-400 font-bold mb-4 text-sm">▶ 特殊ルールの強制適用</h3>
                                <div className="flex items-center justify-between bg-slate-900 p-3 rounded border border-slate-800">
                                    <div className="flex flex-col"><span className="text-xs font-bold text-slate-300">午後天候回復（物理復活）</span>{weather === 'sunny' ? <span className="text-[10px] text-slate-500 mt-1">※天候が曇り・雨の時のみ</span> : weatherRecovery && <span className="text-[10px] text-rose-400 font-bold mt-1">強制適用中</span>}</div>
                                    <button onClick={() => { if (weather !== 'sunny') setWeatherRecovery(!weatherRecovery); }} disabled={weather === 'sunny'} className={`w-12 h-6 rounded-full relative transition-colors ${weather === 'sunny' ? "bg-slate-800 opacity-50" : weatherRecovery ? "bg-rose-600" : "bg-slate-700"}`}><span className={`absolute top-1 left-1 bg-white w-4 h-4 rounded-full transition-transform ${weatherRecovery ? "translate-x-6" : ""}`}></span></button>
                                </div>
                            </div>
                            <div className="bg-slate-950 p-4 rounded-lg border border-slate-800 neon-border">
                                <div className="flex justify-between items-center border-b border-slate-800 pb-2 mb-4">
                                    <h3 className="text-emerald-400 font-bold text-sm">▶ 環境パラメータ調整</h3>
                                    <button onClick={resetToAI} className="text-[9px] bg-slate-800 hover:bg-slate-700 text-cyan-300 border border-cyan-800 px-2 py-1 rounded transition-colors shadow-sm">🔄 AI値に戻す</button>
                                </div>
                                <div className="space-y-3">
                                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">天候</label><select value={weather} onChange={(e) => handleWeatherChange(e.target.value)} className="w-full bg-slate-800 text-cyan-300 text-xs font-bold border border-slate-700 rounded p-2 outline-none"><option value="sunny">晴れ</option><option value="cloudy">曇り</option><option value="rainy">雨</option></select></div>
                                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">トラックバイアス</label><select value={weatherRecovery ? getRecoveredBias(course) : bias} onChange={(e) => setBias(Number(e.target.value))} disabled={weatherRecovery} className="w-full bg-slate-800 text-cyan-300 text-xs font-bold border border-slate-700 rounded p-2 outline-none disabled:opacity-50"><option value={1}>超インベタ</option><option value={2}>イン有利</option><option value={3}>フラット</option><option value={4}>外伸び</option><option value={5}>大外差し</option></select></div>
                                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">想定ペース</label><select value={pace} onChange={(e) => setPace(Number(e.target.value))} className="w-full bg-slate-800 text-cyan-300 text-xs font-bold border border-slate-700 rounded p-2 outline-none"><option value={1}>ドスロー</option><option value={2}>ミドル</option><option value={3}>ハイペース</option></select></div>
                                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">馬場コンディション</label><select value={cond} onChange={(e) => setCond(Number(e.target.value))} className="w-full bg-slate-800 text-cyan-300 text-xs font-bold border border-slate-700 rounded p-2 outline-none"><option value={1}>高速馬場 (良)</option><option value={2}>標準 (稍重)</option><option value={3}>タフ (重・不)</option></select></div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-8">
                            {darkHorses.length > 0 && (
                                <div className="bg-slate-900/90 p-4 rounded-lg border border-rose-500/50 mb-6 shadow-[0_0_15px_rgba(244,63,94,0.15)] relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-rose-500"></div>
                                    <div className="flex justify-between items-center mb-3">
                                        <h3 className="text-rose-400 font-bold text-sm flex items-center"><span className="text-lg mr-2 animate-pulse">🔥</span> 穴馬アラート：展開特注の伏兵</h3>
                                        <div className="flex items-center gap-2"><span className="text-[10px] text-slate-400">想定波乱度:</span><span className={`text-[10px] px-2 py-0.5 rounded font-bold ${turbulenceLevel === 'HIGH' ? 'bg-rose-900 text-rose-300 border border-rose-500' : turbulenceLevel === 'MEDIUM' ? 'bg-amber-900 text-amber-300 border border-amber-500' : 'bg-emerald-900 text-emerald-300 border border-emerald-500'}`}>{turbulenceLevel}</span></div>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                        {darkHorses.map(horse => (
                                            <div key={`dark-${horse.no}`} onClick={() => setSelectedHorseId(horse.no)} className="bg-slate-800 border border-rose-500/30 p-2 rounded flex justify-between items-center cursor-pointer hover:bg-slate-700 transition-colors">
                                                <div className="flex items-center gap-2"><span className="text-rose-400 font-black text-sm">☆</span><span className="text-slate-300 text-[10px] border border-slate-600 px-1 rounded">{horse.frame}枠{horse.no}番</span><span className="text-white font-bold text-sm truncate max-w-[100px]">{horse.name}</span></div>
                                                <div className="text-rose-400 font-black">{horse.score}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="border-b border-slate-800 pb-2 mb-4 flex flex-col sm:flex-row sm:justify-between sm:items-end gap-2">
                                <div><h3 className="text-emerald-400 font-bold text-sm">▶ 総合評価ランキング</h3><p className="text-[10px] text-slate-500 mt-1">※±10kg以上の増減は右端ボタンで補正可能。</p></div>
                                <div className="flex justify-end mb-2 sm:mb-0"><button onClick={fetchLatestOdds} disabled={isFetchingOdds} className={`flex items-center space-x-2 px-4 py-2 rounded-lg font-bold text-sm transition-colors ${isFetchingOdds ? "bg-slate-700 text-slate-400" : "bg-emerald-600 hover:bg-emerald-500 text-white shadow-[0_0_10px_rgba(16,185,129,0.5)]"}`}><span>🔄</span><span>{isFetchingOdds ? "取得中..." : "オッズ自動取得"}</span></button></div>
                            </div>
                            <div className="space-y-2 mb-4">
                                {calculatedHorses.map((horse) => {
                                    const isTop3 = horse.rank <= 3;
                                    const isSelected = selectedHorseId === horse.no;
                                    const rankBadgeColor = horse.rank === 1 ? "text-yellow-400" : horse.rank === 2 ? "text-slate-300" : horse.rank === 3 ? "text-amber-600" : "text-slate-600";
                                    let cardClass = "bg-slate-900 border-slate-800 opacity-80 hover:border-slate-600";
                                    if (isSelected) cardClass = "bg-slate-800 border-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.5)] z-10 relative";
                                    else if (isTop3) cardClass = "bg-slate-800 neon-border-gold";
                                    return (
                                        <div key={horse.no} onClick={() => setSelectedHorseId(horse.no)} className={`p-2.5 rounded border flex items-center justify-between transition-all cursor-pointer ${cardClass}`}>
                                            <div className="flex items-center space-x-3 overflow-hidden"><div className={`text-lg font-black ${rankBadgeColor} w-6 text-center`}>{horse.rank}</div><div className="flex items-center flex-wrap gap-x-2 gap-y-1"><span className="text-slate-400 text-[10px] border border-slate-600 px-1 rounded">{horse.frame}枠{horse.no}番</span><span className="font-bold text-sm text-slate-100 truncate">{horse.name}</span><span className="text-[10px] text-slate-400">({horse.odds}倍)</span></div></div>
                                            <div className="flex items-center space-x-2 pl-2"><div className="flex gap-1"><button onClick={(e)=>{e.stopPropagation(); toggleWeight(horse.no, 10)}} className={`text-[8px] px-1 py-1 rounded border ${manualWeightDiffs[horse.no] === 10 ? 'bg-rose-900 border-rose-500' : 'bg-slate-800 border-slate-700 text-slate-500'}`}>+10</button><button onClick={(e)=>{e.stopPropagation(); toggleWeight(horse.no, -10)}} className={`text-[8px] px-1 py-1 rounded border ${manualWeightDiffs[horse.no] === -10 ? 'bg-blue-900 border-blue-500' : 'bg-slate-800 border-slate-700 text-slate-500'}`}>-10</button></div><div className={`text-xl font-black ${isSelected ? 'text-cyan-400' : isTop3 ? 'text-yellow-500' : 'text-slate-500'}`}>{horse.score}</div><div className="text-[10px] text-cyan-500 w-4">{isSelected ? "◀" : ""}</div></div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="bg-slate-900/80 p-3 rounded-lg border border-slate-700 mb-4 shadow-inner">
                                <div className="flex justify-between items-center mb-2"><span className="text-xs font-bold text-slate-300">✍️ SNSシェア用 予想印</span>{isCustomPrediction && <button onClick={resetCustomPrediction} className="text-[9px] text-cyan-400 border border-cyan-800/50 bg-slate-800 px-2 py-0.5 rounded">🔄 シミュレーション評価順に戻す</button>}</div>
                                <div className="grid grid-cols-5 gap-2">
                                    {['◎', '◯', '▲', '△', '☆'].map((mark, i) => (
                                        <div key={mark} className="flex flex-col"><span className={`text-[10px] font-bold text-center mb-1 ${[0,4].includes(i) ? 'text-rose-400' : i === 1 ? 'text-blue-400' : i === 2 ? 'text-emerald-400' : 'text-slate-400'}`}>{mark}</span>
                                            <select value={customPredictions[i] || ''} onChange={(e) => handleCustomPredictionChange(i, e.target.value)} className="bg-slate-800 text-[10px] text-white p-1 rounded border border-slate-600">{horses.map(h => <option key={h.no} value={h.no}>{h.frame}枠{h.no}番 {h.name}</option>)}</select>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <button onClick={shareToX} className="w-full bg-slate-100 hover:bg-white text-slate-950 font-black py-3 rounded-lg flex items-center justify-center gap-2 transition-all shadow-lg">
                                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>予想をXでシェアする
                            </button>
                        </div>
                    </div>
                    
                    <div className="mt-8 bg-slate-900 p-5 rounded-lg border border-slate-800 text-xs text-slate-400 leading-relaxed">
