<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黒マル式競馬予想シュミレーター (Public Edition)</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .neon-border { box-shadow: 0 0 8px rgba(6, 182, 212, 0.5); }
        .neon-border-active { box-shadow: 0 0 10px rgba(34, 211, 238, 0.8); border-color: #22d3ee !important; }
        .neon-border-gold { box-shadow: 0 0 8px rgba(202, 138, 4, 0.3); border-color: rgba(202, 138, 4, 0.6) !important; }
        .neon-text-cyan { text-shadow: 0 0 10px rgba(34, 211, 238, 0.6); }
        .neon-text-alert { text-shadow: 0 0 10px rgba(244, 63, 94, 0.8); }
        .neon-text-magic { text-shadow: 0 0 10px rgba(167, 139, 250, 0.8); }
        select { background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%2322d3ee' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3E%3C/svg%3E"); background-position: right .5rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; padding-right: 2.5rem; -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-4 font-mono min-h-screen relative">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const API_URL = "https://script.google.com/macros/s/AKfycbxV0f-VF_lw-FQjQ1S2WFUh06QkBRuST8z1SkqFNZ9xwYIGytG6DdCZ2qjVKYAxvxI5/exec";

        const AI_PROMPT = `これから、あなたの予想結果を外部のUIシミュレーターに流し込みます。
以下のレースの基本情報・環境データと、出走予定の全頭分の能力プロファイリングを、コードブロックで出力してください。（前置きや解説の文章は一切不要です。必ず全頭分のデータを含めてください。）

【重要：出力形式について】
スプレッドシートの1つのセルにそのまま貼り付けられるように、JSONの改行やインデント（空白）をすべて削除し、完全に「1行の文字列（Minified JSON）」として出力してください。

{"race":{"updatedAt":"2026/04/09","date":"2026/04/12","raceName":"桜花賞(G1)","location":"阪神","courseName":"芝1600m (外回り)","raceType":"3yo","course":3,"weather":"sunny","bias":3,"pace":2,"cond":2},"horses":[{"no":1,"name":"馬の名前","frame":1,"runStyle":2,"odds":5.5,"baseScore":65,"optBias":3,"optPace":2,"optCond":2,"optCourse":2,"spurt":3,"jockeyClass":"A","specialJockey":true,"popularity":3,"weightDiff":0,"tags":["内枠・先行適性◎"],"isMarked":true}]}

【各項目のルール】
[race]
* updatedAt: 予想データを作成した当日の日付（YYYY/MM/DD形式）
* date: 対象レースの開催日（YYYY/MM/DD形式）
* course: 1(小回り), 2(中回り), 3(大箱) ※確定情報
* raceType: "older"(古馬・標準戦) または "3yo"(3歳若駒戦) ※確定情報

[horses]
* tags: 特殊能力のタグ配列。一般的に伝わる表現にすること（例：["内枠・先行適性◎", "ハイペース消耗戦適性◎", "道悪巧者", "瞬発力特化型"]）`;

        const NativeRadarChart = ({ data }) => {
            const size = 220;
            const cx = size / 2;
            const cy = size / 2;
            const maxRadius = 70;
            const getPoint = (value, index, radiusObj = maxRadius) => {
                const angle = -Math.PI / 2 + (Math.PI * 2 * index) / 5;
                const r = radiusObj * (value / 100);
                return `${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`;
            };
            const bgLevels = [100, 80, 60, 40, 20];
            const dataPolygon = data.map((d, i) => getPoint(d.A, i)).join(' ');
            return (
                <svg width="100%" height="100%" viewBox={`0 0 ${size} ${size}`} className="overflow-visible">
                    {bgLevels.map(level => (
                        <polygon key={level} points={[0,1,2,3,4].map(i => getPoint(level, i)).join(' ')} fill="none" stroke="#334155" strokeWidth="1" />
                    ))}
                    {[0,1,2,3,4].map(i => {
                        const pt = getPoint(100, i).split(',');
                        return <line key={i} x1={cx} y1={cy} x2={pt[0]} y2={pt[1]} stroke="#334155" strokeWidth="1" />
                    })}
                    <polygon points={dataPolygon} fill="rgba(34, 211, 238, 0.4)" stroke="#22d3ee" strokeWidth="2" />
                    {data.map((d, i) => {
                        const pt = getPoint(100, i, maxRadius + 22).split(',');
                        return <text key={i} x={pt[0]} y={pt[1]} fill="#94a3b8" fontSize="10" textAnchor="middle" dominantBaseline="middle" fontWeight="bold">{d.subject}</text>
                    })}
                </svg>
            );
        };

        // UI表示用のテキスト変換ヘルパー
        const getPaceText = (v) => v === 1 ? "ドスロー" : v === 2 ? "ミドル" : "ハイペース";
        const getCondText = (v) => v === 1 ? "高速(良)" : v === 2 ? "標準(稍重)" : "タフ(重不)";
        const getBiasText = (v) => v === 1 ? "超イン" : v === 2 ? "イン有利" : v === 3 ? "フラット" : v === 4 ? "外伸び" : "大外差し";

        function App() {
            const [allRacesData, setAllRacesData] = useState([]);
            const [currentRaceIndex, setCurrentRaceIndex] = useState(0);

            const [horses, setHorses] = useState([]);
            const [raceInfo, setRaceInfo] = useState({ date: "読込中...", raceName: "データ取得中", location: "-", courseName: "-", updatedAt: "----/--/--" });
            
            // AIから受け取った「初期状態」を保存しておくステート
            const [originalSettings, setOriginalSettings] = useState(null);

            const [weather, setWeather] = useState('sunny');
            const [bias, setBias] = useState(3);
            const [pace, setPace] = useState(2);
            const [cond, setCond] = useState(2);
            const [course, setCourse] = useState(3);
            const [raceType, setRaceType] = useState('older');
            const [weatherRecovery, setWeatherRecovery] = useState(false);
            const [selectedHorseId, setSelectedHorseId] = useState(null);
            
            const [isLoading, setIsLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [copyStatus, setCopyStatus] = useState('');

            const loadRaceData = (parsedData) => {
                setHorses(parsedData.horses);
                setRaceInfo({ 
                    date: parsedData.race.date || "-", 
                    raceName: parsedData.race.raceName || "-", 
                    location: parsedData.race.location || "-", 
                    courseName: parsedData.race.courseName || "-",
                    updatedAt: parsedData.race.updatedAt || "----/--/--"
                });
                if (parsedData.race.raceType) setRaceType(parsedData.race.raceType);
                if (parsedData.race.course) setCourse(Number(parsedData.race.course));
                
                // AIの想定値をセットし、オリジナル設定としても記憶
                const aiWeather = parsedData.race.weather || 'sunny';
                const aiBias = Number(parsedData.race.bias) || 3;
                const aiPace = Number(parsedData.race.pace) || 2;
                const aiCond = Number(parsedData.race.cond) || 2;

                setWeather(aiWeather);
                setBias(aiBias);
                setPace(aiPace);
                setCond(aiCond);

                setOriginalSettings({
                    weather: aiWeather,
                    bias: aiBias,
                    pace: aiPace,
                    cond: aiCond
                });
                
                setWeatherRecovery(false);
                setSelectedHorseId(null);
            };

            useEffect(() => {
                fetch(API_URL)
                    .then(response => response.json())
                    .then(parsedData => {
                        if (Array.isArray(parsedData) && parsedData.length > 0) {
                            setAllRacesData(parsedData);
                            loadRaceData(parsedData[0]);
                            setIsLoading(false);
                        } else if (parsedData.race && parsedData.horses) {
                            setAllRacesData([parsedData]);
                            loadRaceData(parsedData);
                            setIsLoading(false);
                        } else {
                            setErrorMsg("データの形式が正しくありません。");
                            setIsLoading(false);
                        }
                    })
                    .catch(() => {
                        setErrorMsg("データベースへの通信に失敗しました。");
                        setIsLoading(false);
                    });
            }, []);

            const handleRaceChange = (e) => {
                const newIndex = Number(e.target.value);
                setCurrentRaceIndex(newIndex);
                loadRaceData(allRacesData[newIndex]);
            };

            const handleWeatherChange = (newWeather) => {
                setWeather(newWeather);
                if (newWeather === 'rainy') { setCond(3); } 
                else if (newWeather === 'cloudy') { setCond(2); } 
                else if (newWeather === 'sunny') { setCond(1); setWeatherRecovery(false); }
            };

            // AIのオリジナル設定にリセットする関数
            const resetToAI = () => {
                if (originalSettings) {
                    setWeather(originalSettings.weather);
                    setBias(originalSettings.bias);
                    setPace(originalSettings.pace);
                    setCond(originalSettings.cond);
                    setWeatherRecovery(false);
                }
            };

            const getRecoveredBias = (currentCourse) => {
                if (currentCourse === 1) return 1;
                if (currentCourse === 2) return 2;
                if (currentCourse === 3) return 4;
                return 3;
            };

            const calculatedHorses = useMemo(() => {
                const effectiveBias = weatherRecovery ? getRecoveredBias(course) : bias;
                const result = horses.map(horse => {
                    let score = horse.baseScore;
                    let alerts = [];
                    let biasDiff = Math.abs(horse.optBias - effectiveBias);
                    const isMagicJockey = horse.jockeyClass === 'S' || horse.specialJockey === true;

                    if (weather === 'sunny' && cond === 1 && horse.frame >= 8) {
                        biasDiff *= 0.5; alerts.push({ text: "☀️ 天候連動: 外枠不利を軽減", type: "magic" });
                    }
                    if (isMagicJockey && biasDiff > 1) {
                        biasDiff = 1; alerts.push({ text: "✨ 名手/職人補正: バイアス不利無効化", type: "magic" });
                    }
                    score += (4 - biasDiff) * 3;
                    score += (2 - Math.abs(horse.optPace - pace)) * 5;
                    score += (2 - Math.abs(horse.optCond - cond)) * 5;
                    score += (2 - Math.abs(horse.optCourse - course)) * 4;

                    if (raceType === '3yo' && pace === 1) {
                        if (horse.popularity === 1) {
                            if (isMagicJockey) { alerts.push({ text: "✨ 魔法/職人芸 (スロー罠無効化)", type: "magic" }); score += 15; } 
                            else { alerts.push({ text: "💣 危険: 若駒スロー自滅の罠", type: "danger" }); score -= 30; }
                        } else if (isMagicJockey) { alerts.push({ text: "✨ 魔法/職人芸 (スタミナ温存)", type: "magic" }); score += 10; }
                    } else if (pace === 1 && isMagicJockey) { alerts.push({ text: "✨ 魔法/職人芸 (展開支配)", type: "magic" }); score += 10; }

                    if (horse.weightDiff <= -10) alerts.push({ text: "🚨 -10kg超: 究極仕上げ or 危険", type: "warning" });

                    if (horse.tags && Array.isArray(horse.tags)) {
                        if (horse.tags.includes("内枠・先行適性◎") && effectiveBias <= 2 && pace === 1) { 
                            score += 20; alerts.push({ text: "🚨 イン前優位条件に完全合致", type: "danger" }); 
                        }
                        if (horse.tags.includes("ハイペース消耗戦適性◎") && pace === 3) { 
                            score += 20; alerts.push({ text: "🚨 厳しい消耗戦で能力全開", type: "warning" }); 
                        }
                    }
                    score = Math.min(100, Math.max(0, Math.round(score)));
                    return { ...horse, score, alerts, isMagicJockey };
                });
                
                // スコア順にソートし、同順位を計算する
                let sorted = result.sort((a, b) => b.score - a.score);
                let currentRank = 1;
                let previousScore = -1;
                return sorted.map((horse, index) => {
                    if (horse.score !== previousScore) {
                        currentRank = index + 1;
                    }
                    previousScore = horse.score;
                    return { ...horse, rank: currentRank };
                });
            }, [horses, weather, bias, pace, cond, course, raceType, weatherRecovery]);

            useEffect(() => {
                if (calculatedHorses.length > 0 && selectedHorseId === null) {
                    setSelectedHorseId(calculatedHorses[0].no);
                }
            }, [calculatedHorses, selectedHorseId]);

            const selectedHorseData = useMemo(() => {
                if (!selectedHorseId) return null;
                return calculatedHorses.find(h => h.no === selectedHorseId) || null;
            }, [selectedHorseId, calculatedHorses]);

            const radarData = useMemo(() => {
                if (!selectedHorseData) return [];
                return [
                    { subject: 'バイアス適性', A: (selectedHorseData.optBias === 3 ? 100 : selectedHorseData.optBias === 4 || selectedHorseData.optBias === 2 ? 80 : 60) },
                    { subject: 'ペース適性', A: (selectedHorseData.optPace * 33) },
                    { subject: '馬場適性', A: (selectedHorseData.optCond * 33) },
                    { subject: 'コース適性', A: (selectedHorseData.optCourse * 33) },
                    { subject: '上がり持続力', A: (selectedHorseData.spurt * 20) }
                ];
            }, [selectedHorseData]);

            const handleCopyPrompt = () => {
                navigator.clipboard.writeText(AI_PROMPT).then(() => {
                    setCopyStatus('✅ コピー完了');
                    setTimeout(() => setCopyStatus(''), 2500);
                }).catch(() => setCopyStatus('❌ 失敗'));
            };

            if (isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-950 flex-col text-cyan-400 font-bold tracking-widest animate-pulse">
                        <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        CONNECTING...
                    </div>
                );
            }

            if (errorMsg) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-950 p-4">
                        <div className="bg-slate-900 border border-rose-500 p-6 rounded-lg text-center">
                            <h2 className="text-2xl font-bold text-rose-500 mb-2">通信エラー</h2>
                            <p className="text-slate-300">{errorMsg}</p>
                        </div>
                    </div>
                );
            }

            const displayDate = raceInfo.date ? raceInfo.date.replace(/-/g, '/') : "----/--/--";

            return (
                <div className="max-w-5xl mx-auto bg-slate-900 p-3 md:p-6 rounded-xl shadow-2xl border border-slate-800 relative mt-4 mb-12 pb-12">
                    <header className="mb-4">
                        <div className="flex flex-col md:flex-row md:justify-between md:items-end gap-3">
                            <h1 className="text-lg sm:text-xl md:text-3xl font-black text-cyan-400 tracking-wider neon-text-cyan flex flex-wrap items-center gap-2">
                                <span>🐴 黒マル式競馬予想シュミレーター</span>
                                <span className="text-[10px] md:text-xs text-slate-500 border border-slate-600 px-2 py-0.5 rounded font-normal">公開版</span>
                            </h1>
                            <div className="inline-flex items-center">
                                <span className="bg-slate-800 text-emerald-400 border border-emerald-700/50 px-3 py-1.5 rounded text-xs font-bold shadow-inner">
                                    🔄 データ更新日：{raceInfo.updatedAt}
                                </span>
                            </div>
                        </div>
                        <p className="text-xs text-slate-400 mt-3 leading-relaxed">
                            ※当サイトの基本データは管理者のAI予想によって自動更新されます。ユーザーは自由にパラメーターを動かしてレース展開によるシミュレーションが可能です。
                        </p>
                    </header>

                    {allRacesData.length > 1 && (
                        <div className="mb-4 bg-slate-950 border border-slate-700 p-3 rounded-lg flex flex-wrap items-center gap-3 shadow-inner">
                            <span className="text-xl">🏇</span>
                            <label className="text-sm text-slate-300 font-bold">対象レース選択:</label>
                            <select value={currentRaceIndex} onChange={handleRaceChange} className="flex-grow bg-slate-800 text-cyan-300 text-base font-bold border border-cyan-700 rounded p-2 outline-none cursor-pointer neon-border">
                                {allRacesData.map((data, idx) => (
                                    <option key={idx} value={idx}>{data.race.raceName} ({data.race.location})</option>
                                ))}
                            </select>
                        </div>
                    )}

                    <div className="bg-slate-950 border border-cyan-700 p-3 md:p-4 rounded-lg mb-6 flex flex-wrap gap-3 items-center neon-border">
                        <div className="bg-slate-800 px-3 py-1 rounded text-cyan-400 text-sm font-bold flex items-center shrink-0">
                            <span className="text-[10px] text-slate-200 font-normal mr-1">開催日:</span>{displayDate}
                        </div>
                        <div className="bg-slate-800 border border-cyan-500/50 px-3 py-1 rounded-md text-base md:text-xl font-black text-cyan-300 shadow-inner">
                            {raceInfo.raceName}
                        </div>
                        <div className="bg-slate-700 px-3 py-1 rounded text-xs text-slate-200 shrink-0">{raceInfo.location} {raceInfo.courseName}</div>
                        <div className="bg-slate-800 border border-slate-600 px-3 py-1 rounded text-[10px] md:text-xs text-slate-300 flex items-center shrink-0">
                            条件: {raceType === '3yo' ? "3歳若駒戦" : "古馬・標準G1"}
                        </div>
                    </div>

                    <div className="mb-6 bg-slate-950 p-4 rounded-lg border border-cyan-900 relative overflow-hidden min-h-[260px] flex flex-col">
                        <h3 className="text-emerald-400 font-bold border-b border-slate-800 pb-2 mb-4 text-sm flex items-center">📊 詳細データ解析{selectedHorseData && <span className="ml-3 text-cyan-300 font-black">{selectedHorseData.frame}枠{selectedHorseId}番 {selectedHorseData.name}</span>}</h3>
                        {selectedHorseData && (
                            <div className="flex flex-col md:flex-row gap-6 items-center">
                                <div className="w-full md:w-1/2 flex justify-center items-center" style={{ minHeight: "220px" }}><NativeRadarChart data={radarData} /></div>
                                <div className="w-full md:w-1/2 text-sm text-slate-300 flex flex-col justify-center">
                                    <div className="grid grid-cols-2 gap-3 mb-3">
                                        <div className="bg-slate-900 p-2 rounded border border-slate-800"><div className="text-[10px] text-slate-500">適合スコア</div><div className="text-3xl font-black text-cyan-400 neon-text-cyan">{selectedHorseData.score}</div></div>
                                        <div className="bg-slate-900 p-2 rounded border border-slate-800"><div className="text-[10px] text-slate-500">基礎能力 (Base)</div><div className="text-2xl font-bold text-white">{selectedHorseData.baseScore}</div></div>
                                    </div>
                                    <ul className="space-y-1 text-xs mb-2">
                                        <li className="flex justify-between border-b border-slate-800 pb-1"><span>上がりポテンシャル</span><span className="text-white font-bold">Lv.{selectedHorseData.spurt} {selectedHorseData.spurt >= 4 ? '(瞬発力型)' : '(消耗戦型)'}</span></li>
                                        <li className="flex justify-between border-b border-slate-800 pb-1"><span>想定脚質 / 騎手</span><span className="text-white font-bold">{selectedHorseData.runStyle === 1 ? '逃げ' : selectedHorseData.runStyle === 2 ? '先行' : selectedHorseData.runStyle === 3 ? '差し' : '追込'} ({selectedHorseData.jockeyClass}級)</span></li>
                                    </ul>
                                    
                                    {/* 激走シナリオ（理想条件の可視化） */}
                                    <div className="mt-2 p-2 bg-slate-800/60 border border-slate-700 rounded text-[11px]">
                                        <div className="text-emerald-400 font-bold mb-1 flex items-center">💡 激走シナリオ（能力最大化条件）</div>
                                        <div className="grid grid-cols-3 gap-1 text-center">
                                            <div className="bg-slate-900 py-1 rounded border border-slate-700/50"><span className="text-slate-500 block text-[9px]">ペース</span><span className="text-slate-200 font-bold">{getPaceText(selectedHorseData.optPace)}</span></div>
                                            <div className="bg-slate-900 py-1 rounded border border-slate-700/50"><span className="text-slate-500 block text-[9px]">馬場</span><span className="text-slate-200 font-bold">{getCondText(selectedHorseData.optCond)}</span></div>
                                            <div className="bg-slate-900 py-1 rounded border border-slate-700/50"><span className="text-slate-500 block text-[9px]">バイアス</span><span className="text-slate-200 font-bold">{getBiasText(selectedHorseData.optBias)}</span></div>
                                        </div>
                                    </div>

                                    {selectedHorseData.tags && selectedHorseData.tags.length > 0 && (<div className="flex flex-wrap gap-1 mt-2">{selectedHorseData.tags.map((tag, i) => (<span key={i} className="text-[10px] bg-cyan-900/30 border border-cyan-700/50 text-cyan-200 px-2 py-0.5 rounded">🏷️ {tag}</span>))}</div>)}
                                    {selectedHorseData.alerts && selectedHorseData.alerts.length > 0 && (<div className="mt-2 pt-2 border-t border-slate-700/50 flex flex-col gap-1">{selectedHorseData.alerts.map((alert, i) => (<div key={i} className={`text-[11px] font-bold ${alert.type === 'magic' ? 'text-purple-400 neon-text-magic' : ''} ${alert.type === 'danger' ? 'text-rose-500 neon-text-alert animate-pulse' : ''} ${alert.type === 'warning' ? 'text-amber-500' : ''}`}>{alert.text}</div>))}</div>)}
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-slate-950 p-4 rounded-lg border border-rose-900 neon-border-alert relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-rose-600"></div>
                                <h3 className="text-rose-400 font-bold mb-4 text-sm">▶ 特殊ルールの強制適用</h3>
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between bg-slate-900 p-3 rounded border border-slate-800">
                                        <div className="flex flex-col"><span className="text-xs font-bold text-slate-300">午後天候回復（物理復活）</span>{weather === 'sunny' ? <span className="text-[10px] text-slate-500 mt-1">※天候が曇り・雨の時のみ</span> : weatherRecovery && <span className="text-[10px] text-rose-400 font-bold mt-1">強制適用中</span>}</div>
                                        <button onClick={() => { if (weather !== 'sunny') setWeatherRecovery(!weatherRecovery); }} disabled={weather === 'sunny'} className={`w-12 h-6 rounded-full relative transition-colors ${weather === 'sunny' ? "bg-slate-800 opacity-50" : weatherRecovery ? "bg-rose-600" : "bg-slate-700"}`}><span className={`absolute top-1 left-1 bg-white w-4 h-4 rounded-full transition-transform ${weatherRecovery ? "translate-x-6" : ""}`}></span></button>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-slate-950 p-4 rounded-lg border border-slate-800 neon-border">
                                <div className="flex justify-between items-center border-b border-slate-800 pb-2 mb-4">
                                    <h3 className="text-emerald-400 font-bold text-sm">▶ 馬場・展開の手動設定</h3>
                                    {/* AI予想値へのリセットボタンを追加 */}
                                    <button onClick={resetToAI} className="text-[10px] bg-slate-800 hover:bg-slate-700 text-cyan-300 border border-cyan-800 px-2 py-1 rounded transition-colors shadow-sm">
                                        🔄 AI予想値に戻す
                                    </button>
                                </div>
                                <div className="space-y-3">
                                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">天候 (連動あり)</label><select value={weather} onChange={(e) => handleWeatherChange(e.target.value)} className="w-full bg-slate-800 text-cyan-300 text-xs font-bold border border-slate-700 rounded p-2 outline-none"><option value="sunny">晴れ</option><option value="cloudy">曇り</option><option value="rainy">雨</option></select></div>
                                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">トラックバイアス</label><select value={weatherRecovery ? getRecoveredBias(course) : bias} onChange={(e) => setBias(Number(e.target.value))} disabled={weatherRecovery} className="w-full bg-slate-800 text-cyan-300 text-xs font-bold border border-slate-700 rounded p-2 outline-none disabled:opacity-50"><option value={1}>超インベタ</option><option value={2}>イン有利</option><option value={3}>フラット</option><option value={4}>外伸び</option><option value={5}>大外差し</option></select></div>
                                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">想定ペース</label><select value={pace} onChange={(e) => setPace(Number(e.target.value))} className="w-full bg-slate-800 text-cyan-300 text-xs font-bold border border-slate-700 rounded p-2 outline-none"><option value={1}>ドスロー</option><option value={2}>ミドル</option><option value={3}>ハイペース</option></select></div>
                                    <div><label className="block text-[10px] font-bold text-slate-400 mb-1">馬場コンディション</label><select value={cond} onChange={(e) => setCond(Number(e.target.value))} className="w-full bg-slate-800 text-cyan-300 text-xs font-bold border border-slate-700 rounded p-2 outline-none"><option value={1}>高速馬場 (良)</option><option value={2}>標準 (稍重)</option><option value={3}>タフ (重・不)</option></select></div>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-8">
                            <h3 className="text-emerald-400 font-bold border-b border-slate-800 pb-2 mb-4 text-sm">▶ 総合評価ランキング</h3>
                            <div className="space-y-2">
                                {calculatedHorses.map((horse, index) => {
                                    const isTop3 = horse.rank <= 3;
                                    const isSelected = selectedHorseId === horse.no;
                                    
                                    // 順位メダルの色
                                    const rankBadgeColor = horse.rank === 1 ? "text-yellow-400" : horse.rank === 2 ? "text-slate-300" : horse.rank === 3 ? "text-amber-600" : "text-slate-600";
                                    
                                    // スコア文字の色 (選択中はシアン、上位はゴールド)
                                    const scoreColor = isSelected ? 'text-cyan-400' : isTop3 ? 'text-yellow-500' : 'text-slate-500';

                                    // カードの枠線スタイル（選択馬はシアン、上位陣は控えめなゴールド）
                                    let cardClass = "bg-slate-900 border-slate-800 opacity-80 hover:border-slate-600";
                                    if (isSelected) {
                                        cardClass = "bg-slate-800 border-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.5)] z-10 relative";
                                    } else if (isTop3) {
                                        cardClass = "bg-slate-800 neon-border-gold";
                                    }

                                    return (
                                        <div key={horse.no} onClick={() => setSelectedHorseId(horse.no)} className={`p-2.5 rounded border flex items-center justify-between transition-all cursor-pointer ${cardClass}`}>
                                            <div className="flex items-center space-x-3 overflow-hidden">
                                                <div className={`text-lg font-black ${rankBadgeColor} w-5 text-center shrink-0`}>{horse.rank}</div>
                                                <div className="flex items-center flex-wrap gap-x-2 gap-y-1">
                                                    <span className="text-slate-400 text-[10px] border border-slate-600 px-1 rounded whitespace-nowrap">{horse.frame}枠{horse.no}番</span>
                                                    <span className="font-bold text-sm text-slate-100 truncate max-w-[120px] sm:max-w-none">{horse.name}</span>
                                                    <span className="text-[10px] text-slate-400 whitespace-nowrap">({horse.odds}倍)</span>
                                                    {horse.alerts.length > 0 && <span className="text-[10px] ml-1" title="詳細レポートあり">📋</span>}
                                                </div>
                                            </div>
                                            <div className="flex items-center space-x-2 shrink-0 pl-2">
                                                <div className={`text-xl font-black ${scoreColor}`}>{horse.score}</div>
                                                <div className="text-[10px] text-cyan-500 w-4 text-center">{isSelected ? "◀" : ""}</div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    
                    <div className="mt-8 bg-slate-900 p-5 rounded-lg border border-slate-800 text-xs text-slate-400 leading-relaxed">
                        <h4 className="text-slate-300 font-bold mb-3 flex items-center text-sm"><span className="mr-2">⚠️</span> 本シミュレーターのご利用に関する注意事項（免責事項）</h4>
                        <ul className="list-disc pl-5 space-y-2">
                            <li><strong>本ツールの性質について：</strong>本シミュレーターは、管理者が複数の競馬情報サイト等の公開データを独自に分析し、個人の見解とロジックに基づいてスコアリングを行った「非公式の個人制作ツール」です。</li>
                            <li><strong>情報の正確性について：</strong>表示されている出走馬データ、想定オッズ、トラックバイアス、適合スコアなどの正確性・最新性を完全に保証するものではありません。実際の確定情報は、必ずJRA等の公式発表をご確認ください。</li>
                            <li><strong>自己責任の原則：</strong>本ツールが算出する「適合スコア」は、あくまでレース展開を想定するためのシミュレーション上の参考値であり、利益を約束するものではありません。馬券の購入は必ずご自身の判断と自己責任で行ってください。</li>
                            <li><strong>免責事項：</strong>本ツールの利用によって生じたいかなる損害につきましても、管理者は一切の責任を負いかねます。レース展開の可能性を検討し、競馬予想を楽しむためのエンターテイメント・ツールとしてご活用ください。</li>
                        </ul>
                    </div>
                    <div className="absolute bottom-4 right-4"><button onClick={handleCopyPrompt} className="text-[10px] text-slate-800 hover:text-slate-500 transition-colors font-mono">{copyStatus ? copyStatus : "🔒 Admin"}</button></div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
