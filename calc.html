<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黒マル式 資金配分シミュレーター V4.4 (管理者専用版)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background: radial-gradient(circle at top right, #0f172a, #1e1b4b, #000000); background-attachment: fixed; color: #f8fafc; }
        .font-mono-custom { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border { border: 1px solid rgba(139, 92, 246, 0.3); box-shadow: 0 0 15px rgba(139, 92, 246, 0.1); }
        .active-glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); border-color: rgba(139, 92, 246, 0.6); }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 3s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- GAS連携設定 ---
        const GAS_URL = "https://script.google.com/macros/s/YOUR_GAS_DEPLOY_ID/exec"; 

        const Simulator = () => {
            const [raceData, setRaceData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);
            const [error, setError] = useState(null);
            
            // 管理設定
            const [targetRaceId, setTargetRaceId] = useState(localStorage.getItem('targetRaceId') || "202406030811");
            const [raceType, setRaceType] = useState(localStorage.getItem('raceType') || "result");
            const [showAdminModal, setShowAdminModal] = useState(false);
            const [tempUrlInput, setTempUrlInput] = useState("");

            // 資金・予想設定
            const [budget, setBudget] = useState(10000);
            const [strategy, setStrategy] = useState("equal_payout"); // equal_payout, safe_main, safe_longshot
            const [ticketType, setTicketType] = useState("3連複"); 
            const [marks, setMarks] = useState({}); // { horseNo: '◎', ... }

            // データ取得
            const fetchData = async (forceUpdate = false) => {
                setLoading(true);
                try {
                    const action = forceUpdate ? "execute" : "read";
                    const url = `${GAS_URL}?action=${action}&race_id=${targetRaceId}&type=${raceType}`;
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.status === "error") throw new Error(data.message);
                    if (data.status === "no_cache") {
                        fetchData(true);
                        return;
                    }

                    // ID照合：保存されているデータのIDとターゲットIDが違う場合は自動更新
                    if (data.race.raceId !== targetRaceId && !forceUpdate) {
                        fetchData(true);
                        return;
                    }

                    setRaceData(data);
                    setError(null);
                } catch (err) {
                    setError("データの取得に失敗しました。URL設定を確認してください。");
                } finally {
                    setLoading(false);
                    setSyncing(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            // 管理者モード：URL解析
            const handleAdminUpdate = () => {
                let id = targetRaceId;
                let type = raceType;
                
                if (tempUrlInput.includes("race_id=")) {
                    id = tempUrlInput.split("race_id=")[1].split("&")[0];
                    type = tempUrlInput.includes("shutuba.html") ? "shutuba" : "result";
                } else if (tempUrlInput.length === 12 && /^\d+$/.test(tempUrlInput)) {
                    id = tempUrlInput;
                }

                localStorage.setItem('targetRaceId', id);
                localStorage.setItem('raceType', type);
                setTargetRaceId(id);
                setRaceType(type);
                setShowAdminModal(false);
                setTempUrlInput("");
                
                // IDが変わったので再取得
                setTimeout(() => fetchData(true), 100);
            };

            // 買い目生成ロジック
            const combinations = useMemo(() => {
                if (!raceData) return [];
                const horses = raceData.horses;
                const markedHorses = Object.entries(marks).filter(([_, m]) => m !== "");
                
                const honmei = markedHorses.filter(([_, m]) => m === "◎").map(([no]) => no);
                const taiko = markedHorses.filter(([_, m]) => m === "◯").map(([no]) => no);
                const ana = markedHorses.filter(([_, m]) => m === "▲").map(([no]) => no);
                const renka = markedHorses.filter(([_, m]) => m === "△").map(([no]) => no);
                const extra = markedHorses.filter(([_, m]) => m === "☆").map(([no]) => no);

                let combos = [];
                const allMarked = markedHorses.map(([no]) => no);

                if (ticketType === "3連複") {
                    const firstSet = [...honmei, ...taiko, ...ana];
                    const secondSet = [...firstSet, ...renka];
                    const thirdSet = [...secondSet, ...extra];
                    
                    for (let i = 0; i < thirdSet.length; i++) {
                        for (let j = i + 1; j < thirdSet.length; j++) {
                            for (let k = j + 1; k < thirdSet.length; k++) {
                                const c = [thirdSet[i], thirdSet[j], thirdSet[k]].sort((a,b)=>a-b);
                                // 条件フィルタ（◎◯▲が1頭以上など、ルールに基づき生成）
                                if (c.some(n => firstSet.includes(n))) {
                                    combos.push(c.join("-"));
                                }
                            }
                        }
                    }
                }
                // 重複排除
                return [...new Set(combos)];
            }, [marks, ticketType, raceData]);

            // 資金配分計算
            const allocation = useMemo(() => {
                if (combinations.length === 0 || !raceData) return [];
                const oddsMap = raceData.oddsData[ticketType];
                
                // 1. 各買い目の推定オッズ取得
                let items = combinations.map(key => ({
                    key,
                    odds: oddsMap[key] || 100.0,
                    weight: 1.0
                }));

                // 2. 戦略に応じたウェイト調整
                if (strategy === "safe_main") {
                    items.forEach(item => { if (item.odds < 100) item.weight = 2.0; });
                } else if (strategy === "safe_longshot") {
                    items.forEach(item => { if (item.odds >= 500) item.weight = 1.5; });
                }

                // 3. 逆数による配分計算
                const totalInverse = items.reduce((acc, cur) => acc + (cur.weight / cur.odds), 0);
                let results = items.map(item => {
                    const rawAmount = budget * (item.weight / item.odds) / totalInverse;
                    const amount = Math.floor(rawAmount / 100) * 100;
                    return { ...item, amount };
                });

                // 余りの調整（本命順に100円ずつ追加）
                let currentTotal = results.reduce((acc, cur) => acc + cur.amount, 0);
                let diff = budget - currentTotal;
                let idx = 0;
                while (diff >= 100 && idx < results.length) {
                    results[idx].amount += 100;
                    diff -= 100;
                    idx++;
                }

                return results;
            }, [combinations, budget, strategy, raceData, ticketType]);

            if (loading && !raceData) return (
                <div className="flex flex-col items-center justify-center h-screen space-y-6">
                    <div className="w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="text-xl font-bold tracking-widest animate-pulse">OMEGA SYSTEM INITIALIZING...</p>
                </div>
            );

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
                        <div>
                            <h1 className="text-3xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-rose-400 mb-1">
                                黒マル式 資金配分シミュレーター <span className="text-sm font-normal not-italic text-slate-500">V4.4</span>
                            </h1>
                            <div className="flex items-center gap-3">
                                <span className="px-2 py-0.5 bg-purple-900/50 text-purple-300 text-xs rounded border border-purple-700 font-bold uppercase tracking-wider">
                                    {raceData?.modeInfo || "分析中"}
                                </span>
                                <h2 className="text-xl font-bold text-slate-200">{raceData?.race.raceName}</h2>
                            </div>
                        </div>
                        <div className="text-right">
                            <p 
                                className="text-xs text-slate-500 font-mono cursor-default select-none active:text-purple-400 transition-colors"
                                onClick={(e) => { if (e.detail === 3) setShowAdminModal(true); }}
                            >
                                LAST SYNC: {raceData?.race.updatedAt} [R-ID: {targetRaceId}]
                            </p>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Left: Input Panel */}
                        <div className="lg:col-span-5 space-y-6">
                            <section className="glass-panel p-6 rounded-2xl neon-border">
                                <h3 className="text-sm font-bold text-purple-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-purple-500 rounded-full"></span> 投資設定
                                </h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs text-slate-400 mb-1 ml-1">軍資金 (JPY)</label>
                                        <input 
                                            type="number" 
                                            value={budget} 
                                            onChange={(e) => setBudget(Number(e.target.value))}
                                            className="w-full bg-black/50 border border-slate-800 rounded-xl px-4 py-3 text-2xl font-mono-custom font-bold text-purple-300 focus:active-glow outline-none transition-all"
                                        />
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {["equal_payout", "safe_main", "safe_longshot"].map(s => (
                                            <button 
                                                key={s}
                                                onClick={() => setStrategy(s)}
                                                className={`py-2 text-[10px] font-bold rounded-lg border transition-all ${strategy === s ? 'bg-purple-600 border-purple-400 text-white shadow-lg' : 'bg-slate-900/50 border-slate-800 text-slate-500 hover:border-slate-700'}`}
                                            >
                                                {s === "equal_payout" ? "均等払戻" : s === "safe_main" ? "本命重視" : "大穴重視"}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            <section className="glass-panel p-6 rounded-2xl neon-border">
                                <h3 className="text-sm font-bold text-rose-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                    <span className="w-2 h-2 bg-rose-500 rounded-full"></span> 予想印入力
                                </h3>
                                <div className="grid grid-cols-6 gap-2">
                                    {raceData?.horses.map(h => (
                                        <div key={h.no} className="flex flex-col items-center">
                                            <span className="text-[10px] text-slate-500 font-mono mb-1">{h.no}</span>
                                            <button 
                                                onClick={() => {
                                                    const order = ["", "◎", "◯", "▲", "△", "☆"];
                                                    const current = marks[h.no] || "";
                                                    const next = order[(order.indexOf(current) + 1) % order.length];
                                                    setMarks({...marks, [h.no]: next});
                                                }}
                                                className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-sm transition-all border-2 ${
                                                    marks[h.no] === "◎" ? "bg-rose-900/30 border-rose-500 text-rose-400" :
                                                    marks[h.no] === "◯" ? "bg-orange-900/30 border-orange-500 text-orange-400" :
                                                    marks[h.no] === "▲" ? "bg-yellow-900/30 border-yellow-500 text-yellow-400" :
                                                    marks[h.no] === "△" ? "bg-emerald-900/30 border-emerald-500 text-emerald-400" :
                                                    marks[h.no] === "☆" ? "bg-blue-900/30 border-blue-500 text-blue-400" :
                                                    "bg-slate-900/50 border-slate-800 text-slate-700 hover:border-slate-600"
                                                }`}
                                            >
                                                {marks[h.no] || ""}
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>

                        {/* Right: Results Panel */}
                        <div className="lg:col-span-7 space-y-6">
                            <section className="glass-panel p-6 rounded-2xl neon-border min-h-[400px]">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-sm font-bold text-purple-400 uppercase tracking-widest flex items-center gap-2">
                                        <span className="w-2 h-2 bg-purple-500 rounded-full animate-pulse"></span> シミュレーション結果
                                    </h3>
                                    <div className="text-right">
                                        <p className="text-[10px] text-slate-500 uppercase">Total Bet</p>
                                        <p className="text-xl font-mono-custom font-bold text-slate-200">
                                            ¥{allocation.reduce((acc, cur) => acc + cur.amount, 0).toLocaleString()}
                                        </p>
                                    </div>
                                </div>

                                <div className="space-y-2 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                    {allocation.length === 0 ? (
                                        <div className="h-64 flex items-center justify-center text-slate-600 italic text-sm">
                                            予想印を入力して買い目を生成してください
                                        </div>
                                    ) : allocation.map(item => (
                                        <div key={item.key} className="flex items-center justify-between bg-slate-900/40 p-3 rounded-xl border border-slate-800/50 hover:border-purple-900/50 transition-all group">
                                            <div className="flex items-center gap-4">
                                                <div className="text-xs font-mono-custom text-purple-400 tracking-wider">
                                                    {item.key.split('-').map(n => n.padStart(2, '0')).join(' - ')}
                                                </div>
                                                <div className="text-[10px] text-slate-500 font-mono-custom">
                                                    x{item.odds.toFixed(1)}
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-sm font-mono-custom font-bold text-slate-200 group-hover:text-purple-300">
                                                    ¥{item.amount.toLocaleString()}
                                                </div>
                                                <div className="text-[9px] text-slate-500 font-mono-custom">
                                                    RET: ¥{(item.amount * item.odds).toLocaleString()}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>

                    {/* Admin Modal */}
                    {showAdminModal && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 p-4">
                            <div className="glass-panel p-8 rounded-3xl neon-border max-w-lg w-full">
                                <h2 className="text-2xl font-black text-purple-400 mb-6">管理者専用：ターゲット同期</h2>
                                <p className="text-sm text-slate-400 mb-6 leading-relaxed">
                                    対象レースのnetkeiba URLまたは12桁のレースIDを入力してください。<br/>
                                    変更後、推定オッズエンジンが自動的に再実行されます。
                                </p>
                                <input 
                                    type="text" 
                                    placeholder="https://race.netkeiba.com/race/result.html?race_id=..."
                                    value={tempUrlInput}
                                    onChange={(e) => setTempUrlInput(e.target.value)}
                                    className="w-full bg-black/50 border border-slate-800 rounded-xl px-4 py-4 text-sm font-mono-custom text-slate-200 mb-6 outline-none focus:border-purple-500 transition-all"
                                />
                                <div className="flex gap-4">
                                    <button 
                                        onClick={() => setShowAdminModal(false)}
                                        className="flex-1 py-3 text-slate-500 font-bold hover:text-slate-300 transition-colors"
                                    >
                                        キャンセル
                                    </button>
                                    <button 
                                        onClick={handleAdminUpdate}
                                        className="flex-2 px-8 py-3 bg-purple-600 text-white font-bold rounded-xl shadow-lg shadow-purple-900/20 hover:bg-purple-500 transition-all"
                                    >
                                        URL同期を実行
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<Simulator />);
    </script>
</body>
</html>
