<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黒マル式 資金配分シミュレーター V4.6 (管理者専用版)</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

body {
font-family: 'Noto Sans JP', sans-serif;
background: radial-gradient(circle at top right, #0f172a, #1e1b4b, #000000);
background-attachment: fixed;
color: #f8fafc;
}
.font-mono-custom { font-family: 'JetBrains Mono', monospace; }

.glass-panel {
background: rgba(255, 255, 255, 0.03);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255, 255, 255, 0.08);
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
}
.glass-input {
background: rgba(0, 0, 0, 0.3);
border: 1px solid rgba(255, 255, 255, 0.1);
color: #fff;
transition: all 0.3s ease;
}
.glass-input:focus {
background: rgba(0, 0, 0, 0.6);
border-color: #a855f7;
outline: none;
box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 3px; }
</style>
</head>
<body class="antialiased min-h-screen relative">
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// --- API設定 ---
const ODDS_API_URL = "https://script.google.com/macros/s/AKfycbzsZuk97H1-wLQULy6KbuqqL69G2tdltuMBM3GeBCSyheGtJ45k9wwqw7jjO0mTmoOm/exec";
const formatCurrency = (num) => new Intl.NumberFormat('ja-JP').format(num);

const App = () => {
const [isFetchingOdds, setIsFetchingOdds] = useState(false);
const [isLoading, setIsLoading] = useState(true);
const [raceInfo, setRaceInfo] = useState({ date: "", raceName: "読込中...", location: "", updatedAt: "-", raceId: "" });
const [horses, setHorses] = useState([]);
const [oddsData, setOddsData] = useState({});

// 管理用：localStorageには「現在ブラウザでターゲットにしているID」を保存
const [targetRaceId, setTargetRaceId] = useState(localStorage.getItem('targetRaceId') || "");
const [raceType, setRaceType] = useState(localStorage.getItem('raceType') || "result");
const [showAdminModal, setShowAdminModal] = useState(false);
const [tempUrlInput, setTempUrlInput] = useState("");

const [horseMarks, setHorseMarks] = useState({});
const [betTypes, setBetTypes] = useState(['馬連']);
const [formation, setFormation] = useState({});
const [generatedBets, setGeneratedBets] = useState([]);
const [budget, setBudget] = useState('10000');
const [logic, setLogic] = useState('equal');
const [results, setResults] = useState([]);
const [summary, setSummary] = useState({ totalBet: 0, syntheticOdds: 0 });

const [showHelpModal, setShowHelpModal] = useState(false);
const [showStep1HelpModal, setShowStep1HelpModal] = useState(false);
const [expandedGroups, setExpandedGroups] = useState({});

const allAvailableTypes = ['単勝', '複勝', '枠連', '馬連', '馬単', 'ワイド', '3連複', '3連単'];

useEffect(() => {
fetchInitialCache();
}, []);

const fetchInitialCache = async () => {
try {
// 1. GASからキャッシュ（または永続保存されたメインレース）を取得
const response = await fetch(`${ODDS_API_URL}?action=read`);
const result = await response.json();

if (result.status === "no_cache") {
    await fetchLatestOdds(targetRaceId, raceType, true);
    return;
}

// 2. ブラウザのtargetRaceIdが空の場合は、GAS側から返ってきた現在のメインレースIDをセット
if (!targetRaceId && result.race?.raceId) {
    setTargetRaceId(result.race.raceId);
    localStorage.setItem('targetRaceId', result.race.raceId);
}

// 3. ID照合：ブラウザ側のターゲットとGAS側のデータが不一致なら同期
if (targetRaceId && result.race?.raceId && result.race.raceId !== targetRaceId) {
    await fetchLatestOdds(targetRaceId, raceType, true);
    return;
}

if (result.horses && result.oddsData) {
loadRaceData(result);
}
} catch (e) {
console.error("Initial load failed", e);
} finally {
setIsLoading(false);
}
};

const loadRaceData = (data) => {
if (!data) return;
setHorses(data.horses || []);
setOddsData(data.oddsData || {});
setRaceInfo({
date: data.race?.date || "",
raceName: data.race?.raceName || "名称未設定",
location: data.race?.location || "",
updatedAt: data.race?.updatedAt || "-",
raceId: data.race?.raceId || ""
});

const initialMarks = {};
(data.horses || []).forEach(h => initialMarks[h.no] = '');
setHorseMarks(initialMarks);
setFormation({});
setGeneratedBets([]);
setResults([]);
};

const fetchLatestOdds = async (id = targetRaceId, type = raceType, isInitial = false) => {
setIsFetchingOdds(true);
try {
// action=execute を指定することでGAS側の永続プロパティを更新させる
const response = await fetch(`${ODDS_API_URL}?action=execute&race_id=${id}&type=${type}`);
const result = await response.json();

if (result.horses && result.oddsData) {
loadRaceData(result);
if (id) {
    setTargetRaceId(id);
    localStorage.setItem('targetRaceId', id);
    localStorage.setItem('raceType', type);
}
if (!isInitial) {
    alert(`【${result.modeInfo || 'データ'}】読み込み完了！\n最新オッズを取得しました`);
}
} else {
alert("データの取得に失敗しました: " + (result.message || ""));
}
} catch (error) {
console.error("Odds fetch error:", error);
alert("API通信エラーが発生しました。");
} finally {
setIsFetchingOdds(false);
setIsLoading(false);
}
};

const handleResetMarks = () => {
if(window.confirm("印と買い目をすべてリセットしますか？")) {
const resetMarks = {};
horses.forEach(h => resetMarks[h.no] = '');
setHorseMarks(resetMarks);
setFormation({});
setGeneratedBets([]);
setResults([]);
}
};

const currentDoubleCircleCount = Object.values(horseMarks).filter(m => m === '◎').length;

const updateMark = (horseNo, mark) => {
setHorseMarks(prev => ({ ...prev, [horseNo]: mark }));
};

const toggleBetType = (type) => {
setBetTypes(prev => prev.includes(type) ? prev.filter(t => t !== type) : [...prev, type]);
};

useEffect(() => {
const newFormation = {};
Object.keys(horseMarks).forEach(noStr => {
const no = Number(noStr);
const mark = horseMarks[noStr];
if (!mark) {
newFormation[no] = { 1: false, 2: false, 3: false };
return;
}
let f1 = false, f2 = false, f3 = false;
if (mark === '◎' || mark === '◯' || mark === '▲') { f1=true; f2=true; f3=true; }
else if (mark === '△') { f1=false; f2=true; f3=true; }
else if (mark === '☆') { f1=false; f2=false; f3=true; }
const has3rd = betTypes.includes('3連複') || betTypes.includes('3連単');
const has2nd = betTypes.includes('馬連') || betTypes.includes('馬単') || betTypes.includes('ワイド') || betTypes.includes('枠連');
if (!has3rd) f3 = false;
if (!has2nd && !has3rd) f2 = false;
newFormation[no] = { 1: f1, 2: f2, 3: f3 };
});
setFormation(newFormation);
}, [horseMarks, betTypes]);

const toggleFormation = (horseNo, pos) => {
setFormation(prev => ({ ...prev, [horseNo]: { ...prev[horseNo], [pos]: !prev[horseNo][pos] } }));
};

const generateBets = () => {
const pos1 = Object.keys(formation).filter(no => formation[no][1]);
const pos2 = Object.keys(formation).filter(no => formation[no][2]);
const pos3 = Object.keys(formation).filter(no => formation[no][3]);

let newBets = [];
let betIdCounter = 0;

betTypes.forEach(bType => {
let rawCombos = [];
if (bType === '単勝' || bType === '複勝') {
pos1.forEach(n => rawCombos.push([n]));
} else if (bType === '馬単') {
pos1.forEach(a => pos2.forEach(b => { if(a !== b) rawCombos.push([a, b]) }));
} else if (bType === '馬連' || bType === 'ワイド') {
pos1.forEach(a => pos2.forEach(b => {
if (a !== b) rawCombos.push([a, b].sort((x,y) => Number(x) - Number(y)));
}));
} else if (bType === '3連単') {
pos1.forEach(a => pos2.forEach(b => pos3.forEach(c => {
if (a !== b && b !== c && a !== c) rawCombos.push([a, b, c]);
})));
} else if (bType === '3連複') {
pos1.forEach(a => pos2.forEach(b => pos3.forEach(c => {
if (a !== b && b !== c && a !== c) rawCombos.push([a, b, c].sort((x,y) => Number(x) - Number(y)));
})));
} else if (bType === '枠連') {
const frames1 = pos1.map(n => horses.find(h=>h.no==n)?.frame).filter(Boolean);
const frames2 = pos2.map(n => horses.find(h=>h.no==n)?.frame).filter(Boolean);
frames1.forEach(f1 => frames2.forEach(f2 => {
rawCombos.push([f1, f2].sort((x,y) => Number(x) - Number(y)));
}));
}
const uniqueStrs = [...new Set(rawCombos.map(c => c.join('-')))];
uniqueStrs.forEach(s => {
const combo = s.split('-');
const name = bType.includes('単') ? combo.join(' → ') : combo.join(' - ');
const displayName = bType === '枠連' ? `${combo[0]}枠-${combo[1]}枠` : name;
let odds = oddsData[bType] ? (oddsData[bType][s] || '') : '';
newBets.push({ id: betIdCounter++, combo, type: bType, memo: `[${bType}] ${displayName}`, odds });
});
});
setGeneratedBets(newBets);
setResults([]);
};

const handleRemoveBet = (id) => {
setGeneratedBets(prev => prev.filter(b => b.id !== id));
};

const handleUpdateOdds = (id, value) => {
setGeneratedBets(prev => prev.map(b => b.id === id ? { ...b, odds: value } : b));
};

const minRequiredBudget = generatedBets.length * 100;
const isBudgetValid = parseInt(budget, 10) >= minRequiredBudget && generatedBets.length > 0;

const handleCalculate = () => {
if (!isBudgetValid) return;
const numBudget = parseInt(budget, 10);
const validBets = generatedBets.filter(b => !isNaN(parseFloat(b.odds)) && parseFloat(b.odds) > 0);
if (validBets.length === 0) return;

const calcEqualDistribution = (betsList, totalFund) => {
const sumInv = betsList.reduce((acc, bet) => acc + (1 / parseFloat(bet.odds)), 0);
let allocated = 0;
let remainders = betsList.map(bet => {
const ideal = totalFund * ((1 / parseFloat(bet.odds)) / sumInv);
const floored = Math.floor(ideal / 100) * 100;
allocated += floored;
return { ...bet, floored, remainder: ideal - floored, odds: parseFloat(bet.odds) };
});
let remFund = totalFund - allocated;
remainders.sort((a, b) => b.remainder - a.remainder).forEach(r => {
if (remFund >= 100) { r.floored += 100; remFund -= 100; }
});
return remainders.map(r => ({ id: r.id, addedAmount: r.floored }));
};

let effectiveLogic = logic;
let baseAllocations = [];
let totalCover = 0;

if (logic !== 'equal') {
baseAllocations = validBets.map(bet => {
const odds = parseFloat(bet.odds);
const minCover = Math.ceil(numBudget / odds / 100) * 100;
totalCover += minCover;
return { ...bet, amount: minCover, odds };
});
if (totalCover > numBudget) effectiveLogic = 'equal';
}

let newResults = [];
if (effectiveLogic === 'equal') {
const eqDist = calcEqualDistribution(validBets, numBudget);
newResults = validBets.map(bet => {
const dist = eqDist.find(d => d.id === bet.id);
return { ...bet, odds: parseFloat(bet.odds), betAmount: dist ? dist.addedAmount : 0 };
});
} else {
const leftover = Math.floor((numBudget - totalCover) / 100) * 100;
let targetBets = [];
if (logic === 'gami-favorite') {
targetBets = validBets.filter(b => b.type !== '枠連' && b.combo.some(no => horseMarks[no] === '◎'));
} else if (logic === 'gami-longshot') {
targetBets = validBets.filter(b => b.type !== '枠連' && b.combo.some(no => horseMarks[no] === '☆'));
}
if (targetBets.length === 0) targetBets = validBets;
const extraDist = calcEqualDistribution(targetBets, leftover > 0 ? leftover : 0);
newResults = baseAllocations.map(alloc => {
const ext = extraDist.find(d => d.id === alloc.id);
return { ...alloc, betAmount: alloc.amount + (ext ? ext.addedAmount : 0) };
});
}

const actualTotalBet = newResults.reduce((acc, curr) => acc + curr.betAmount, 0);
setResults(newResults.map(res => ({ ...res, payout: Math.floor(res.betAmount * res.odds), profit: Math.floor(res.betAmount * res.odds) - actualTotalBet })));
const sumInv = validBets.reduce((acc, bet) => acc + (1 / parseFloat(bet.odds)), 0);
setSummary({ totalBet: actualTotalBet, syntheticOdds: sumInv > 0 ? 1 / sumInv : 0 });
setExpandedGroups({});
};

const groupedResults = useMemo(() => {
if (results.length === 0) return [];
const groups = {};
results.forEach(res => {
if (res.betAmount === 0) return;
const key = `${res.type}_${res.betAmount}`;
if (!groups[key]) groups[key] = { key: key, type: res.type, betAmount: res.betAmount, items: [] };
groups[key].items.push(res);
});

return Object.values(groups).map(group => {
const type = group.type;
let labelElements = {};
if (type === '単勝' || type === '複勝') labelElements = { badge: type, axis: group.items.map(it => it.combo[0]).join(', '), tails: "", count: group.items.length };
else if (type === '枠連') labelElements = { badge: type, axis: `${group.items.map(it => it.combo[0]).join(', ')}枠`, tails: `${group.items.map(it => it.combo[1]).join(', ')}枠`, count: group.items.length };
else if (type.includes('3連')) labelElements = { badge: type, axis: [...new Set(group.items.map(it => it.combo[0]))].join(','), tails: `${[...new Set(group.items.map(it => it.combo[1]))].join(',')} - ${[...new Set(group.items.map(it => it.combo[2]))].join(',')}`, count: group.items.length };
else labelElements = { badge: type, axis: [...new Set(group.items.map(it => it.combo[0]))].join(', '), tails: [...new Set(group.items.map(it => it.combo[1]))].join(', '), count: group.items.length };
return { ...group, labelElements, isSingle: group.items.length === 1 };
});
}, [results]);

const groupedByBetType = useMemo(() => {
const typesObj = {};
allAvailableTypes.forEach(t => { typesObj[t] = []; });
groupedResults.forEach(g => { if (typesObj[g.type]) typesObj[g.type].push(g); });
return Object.keys(typesObj).filter(t => typesObj[t].length > 0).map(t => ({ type: t, groups: typesObj[t], totalAmount: typesObj[t].reduce((sum, g) => sum + (g.betAmount * g.items.length), 0) }));
}, [groupedResults]);

const toggleGroup = (key) => setExpandedGroups(prev => ({ ...prev, [key]: !prev[key] }));

if (isLoading) return <div className="min-h-screen flex items-center justify-center font-mono-custom text-purple-300 tracking-widest animate-pulse">DRIVE CACHE LOADING...</div>;

return (
<div className="max-w-md mx-auto md:max-w-2xl px-4 py-8 relative">
<header className="mb-6">
<div className="flex items-center gap-2 mb-2">
<span className="bg-purple-600/50 text-purple-200 border border-purple-400/50 text-[10px] px-2 py-0.5 rounded font-bold">SMART SUMMARY EDITION</span>
<button onClick={() => setShowHelpModal(true)} className="ml-auto bg-slate-800 text-slate-300 border border-slate-600 px-2 py-0.5 rounded text-[10px] font-bold hover:bg-slate-700 transition-colors">❓ 使い方</button>
</div>
<h1 className="text-2xl font-black text-white">資金配分シミュレーター</h1>
<p 
    className="text-[10px] text-slate-400 mt-1 font-mono-custom cursor-default select-none"
    onClick={(e) => { if (e.detail === 3) setShowAdminModal(true); }}
>
    最終同期日時：{raceInfo.updatedAt}
</p>
</header>

<section className="glass-panel rounded-2xl p-5 mb-6 relative overflow-hidden">
<div className="absolute top-0 left-0 w-1 h-full bg-purple-400"></div>
<div className="bg-black/40 border border-white/10 rounded-lg p-3 mb-4 text-center">
<span className="text-lg font-bold text-white tracking-wider">{raceInfo.raceName}</span>
{raceInfo.location && <span className="text-sm text-slate-400 ml-2">({raceInfo.location})</span>}
</div>

<div className="flex flex-wrap justify-between items-center mb-4 gap-y-2">
<h2 className="text-sm font-bold text-purple-300 flex items-center"><span className="bg-purple-900/50 px-2 py-0.5 rounded mr-2 text-[10px]">STEP 1</span> 出走馬の印</h2>
<div className="flex items-center gap-2 ml-auto">
<button onClick={() => setShowStep1HelpModal(true)} className="bg-slate-800 text-purple-200 border border-purple-500/50 px-2 py-1 rounded text-[10px] font-bold hover:bg-slate-700 transition-colors">❓ 印の意味</button>
<button onClick={handleResetMarks} className="bg-slate-800/80 text-rose-300 border border-rose-500/50 px-2 py-1 rounded text-[10px] font-bold hover:bg-rose-900/50 transition-colors">🔄 リセット</button>
</div>
</div>

<button onClick={() => fetchLatestOdds(targetRaceId, raceType, false)} disabled={isFetchingOdds} className={`w-full py-3 mb-4 rounded-lg font-bold text-sm transition-colors flex items-center justify-center gap-2 ${isFetchingOdds ? "bg-slate-700 text-slate-400" : "bg-emerald-600 hover:bg-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.3)]"}`}>
<span>{isFetchingOdds ? "🔄" : "⬇️"}</span>{isFetchingOdds ? "オッズ取得中..." : "最新オッズを取得"}
</button>

<div className="grid grid-cols-1 md:grid-cols-2 gap-2 max-h-64 overflow-y-auto pr-1 mt-4">
{horses.map(horse => (
<div key={horse.no} className={`flex justify-between items-center p-2 rounded-lg border ${horseMarks[horse.no] ? 'bg-purple-900/30 border-purple-500/50' : 'bg-black/30 border-white/5'}`}>
<div className="flex items-center gap-2 overflow-hidden w-2/3">
<span className="text-[10px] text-slate-400 border border-slate-700 px-1 rounded">{horse.frame}枠{horse.no}番</span>
<span className={`text-sm font-bold truncate ${horseMarks[horse.no] ? 'text-white' : 'text-slate-400'}`}>{horse.name}</span>
</div>
<select value={horseMarks[horse.no]} onChange={(e) => updateMark(horse.no, e.target.value)} className={`w-1/3 p-1 text-xs rounded outline-none ${horseMarks[horse.no] ? 'bg-purple-600 text-white font-bold' : 'glass-input'}`}>
<option value="" className="bg-slate-900">無印</option>
{(horseMarks[horse.no] === '◎' || currentDoubleCircleCount < 2) && <option value="◎" className="bg-slate-900">◎ 本命</option>}
<option value="◯" className="bg-slate-900">◯ 対抗</option><option value="▲" className="bg-slate-900">▲ 単穴</option><option value="△" className="bg-slate-900">△ 連下</option><option value="☆" className="bg-slate-900">☆ 穴</option>
</select>
</div>
))}
</div>
</section>

<section className={`glass-panel rounded-2xl p-5 mb-6 relative overflow-hidden transition-all ${Object.keys(horseMarks).filter(k => horseMarks[k] !== '').length === 0 ? 'opacity-50 pointer-events-none' : ''}`}>
<div className="absolute top-0 left-0 w-1 h-full bg-cyan-400"></div>
<h2 className="text-sm font-bold text-cyan-300 mb-4 flex items-center"><span className="bg-cyan-900/50 px-2 py-0.5 rounded mr-2 text-[10px]">STEP 2</span> 券種と買い目</h2>
<div className="mb-4 flex flex-wrap gap-2">
{allAvailableTypes.map(t => (
<button key={t} onClick={() => toggleBetType(t)} className={`px-3 py-1.5 text-xs font-bold rounded-full border transition-all ${betTypes.includes(t) ? 'bg-cyan-500 text-white' : 'bg-black/30 text-slate-400 border-slate-700'}`}>{t}</button>
))}
</div>
<div className="bg-black/40 rounded-xl p-3 mb-4 border border-white/5 space-y-2">
{Object.keys(horseMarks).filter(k => horseMarks[k] !== '').map(noStr => (
<div key={noStr} className="flex items-center justify-between">
<div className="flex items-center gap-2 w-1/2">
<span className={`text-xs font-bold w-3 ${horseMarks[noStr] === '◎' ? 'text-rose-400' : 'text-yellow-300'}`}>{horseMarks[noStr]}</span>
<span className="text-xs text-slate-200 truncate">{horses.find(x => x.no == noStr)?.name}</span>
</div>
<div className="flex justify-end gap-1 w-1/2">
{[1,2,3].map(pos => <button key={pos} onClick={() => toggleFormation(noStr, pos)} className={`w-9 h-6 rounded text-[10px] ${formation[noStr]?.[pos] ? 'bg-cyan-500 text-white' : 'bg-slate-800 text-slate-500'}`}>{pos}頭目</button>)}
</div>
</div>
))}
</div>
<button onClick={generateBets} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg">買い目を生成する</button>
</section>

{generatedBets.length > 0 && (
<section className="glass-panel rounded-2xl p-5 mb-6 animate-fade-in relative border-yellow-500/30">
<div className="absolute top-0 left-0 w-1 h-full bg-yellow-400"></div>
<h2 className="text-sm font-bold text-yellow-300 mb-4 flex items-center"><span className="bg-yellow-900/50 px-2 py-0.5 rounded mr-2 text-[10px]">STEP 3</span> オッズ確認</h2>
<div className="space-y-2 max-h-64 overflow-y-auto pr-2">
{generatedBets.map(bet => (
<div key={bet.id} className="flex justify-between items-center bg-black/30 p-2 rounded border border-white/5">
<div className="text-xs font-bold text-white truncate pr-2"><button onClick={() => handleRemoveBet(bet.id)} className="text-rose-500 mr-2 font-black">✕</button>{bet.memo}</div>
<input type="number" step="0.1" value={bet.odds} onChange={(e) => handleUpdateOdds(bet.id, e.target.value)} className="glass-input w-20 p-1.5 rounded text-sm text-right font-mono-custom" />
</div>
))}
</div>
</section>
)}

{generatedBets.length > 0 && (
<section className="glass-panel rounded-2xl p-5 mb-8 animate-fade-in relative border-emerald-500/30">
<div className="absolute top-0 left-0 w-1 h-full bg-emerald-400"></div>
<h2 className="text-sm font-bold text-emerald-300 mb-4 flex items-center"><span className="bg-emerald-900/50 px-2 py-0.5 rounded mr-2 text-[10px]">STEP 4</span> 予算と戦略</h2>
<div className="space-y-4 mb-6">
<input type="number" value={budget} onChange={(e) => setBudget(e.target.value)} className={`glass-input w-full p-3 rounded-lg text-xl font-bold font-mono-custom ${!isBudgetValid ? 'border-rose-500 text-rose-300' : ''}`} />
<select value={logic} onChange={(e) => setLogic(e.target.value)} className="glass-input w-full p-3 rounded-lg text-sm font-bold outline-none">
<option value="equal" className="bg-slate-900">戦略A：均等払い戻し</option>
<option value="gami-favorite" className="bg-slate-900">戦略B：赤字防止 ＆ 本命(◎)重視</option>
<option value="gami-longshot" className="bg-slate-900">戦略C：赤字防止 ＆ 穴馬(☆)重視</option>
</select>
</div>
<button onClick={handleCalculate} disabled={!isBudgetValid} className="w-full bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 text-white font-black py-4 text-lg rounded-lg shadow-[0_0_20px_rgba(16,185,129,0.4)]">資金を自動配分する</button>
</section>
)}

{results.length > 0 && (
<section className="glass-panel rounded-2xl p-5 mb-8 border-rose-500/30 animate-fade-in">
<h2 className="text-xl font-black text-white mb-6 text-center tracking-widest">配分結果</h2>
<div className="grid grid-cols-2 gap-4 mb-6 text-center">
<div className="bg-black/30 p-3 rounded-xl border border-white/10"><span className="block text-[10px] text-slate-400 mb-1">実投資額</span><div className="font-mono-custom text-lg font-bold text-white">{formatCurrency(summary.totalBet)}円</div></div>
<div className="bg-black/30 p-3 rounded-xl border border-cyan-500/30"><span className="block text-[10px] text-cyan-400 mb-1">合成オッズ</span><div className="font-mono-custom text-lg font-bold text-cyan-300">{summary.syntheticOdds.toFixed(2)}倍</div></div>
</div>
<div className="space-y-5">
{groupedByBetType.map((typeGroup) => (
<div key={typeGroup.type} className="border border-slate-700/60 rounded-xl p-3 bg-black/20">
<h3 className="text-sm font-bold text-slate-300 mb-3 border-b border-slate-700/80 pb-1 flex justify-between"><span>{typeGroup.type}</span><span className="text-xs text-yellow-400">計 {formatCurrency(typeGroup.totalAmount)}円</span></h3>
{typeGroup.groups.map((group) => (
<div key={group.key} className="bg-gradient-to-r from-black/40 to-slate-900/40 border border-white/10 rounded-lg p-2 mb-2">
<div onClick={() => !group.isSingle && toggleGroup(group.key)} className={`flex justify-between items-center ${!group.isSingle ? 'cursor-pointer' : ''}`}>
<div className="text-cyan-300 font-bold text-sm">{group.labelElements.axis} {group.labelElements.tails && `- ${group.labelElements.tails}`} <span className="text-slate-500 text-[10px]">({group.labelElements.count}点)</span></div>
<div className="text-yellow-400 font-bold text-sm">{formatCurrency(group.betAmount)}円{!group.isSingle && (expandedGroups[group.key] ? ' ▲' : ' ▼')}</div>
</div>
{expandedGroups[group.key] && (
<div className="mt-2 pt-2 border-t border-white/5 space-y-1">
{group.items.map(res => (
<div key={res.id} className="flex justify-between text-[10px] text-slate-400"><span>{res.combo.join('-')} ({res.odds}倍)</span><span>払戻: {formatCurrency(res.payout)}円 (利益: {res.profit > 0 ? '+' : ''}{formatCurrency(res.profit)}円)</span></div>
))}
</div>
)}
</div>
))}
</div>
))}
</div>
</section>
)}

{showHelpModal && <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm"><div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-md w-full relative"><button onClick={() => setShowHelpModal(false)} className="absolute top-4 right-4 text-slate-400">✕</button><h3 className="text-lg font-bold text-white mb-4">🔰 使い方</h3><div className="space-y-4 text-sm text-slate-300"><p>1. 右上の同期テキストを3回クリックして管理モードを起動</p><p>2. 対象レースのURLを入力して「URL同期」を実行</p><p>3. 予想印をつけて「買い目生成」→「資金配分」</p></div><button onClick={() => setShowHelpModal(false)} className="mt-6 w-full bg-slate-700 py-3 rounded-lg font-bold">閉じる</button></div></div>}

{showStep1HelpModal && <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm"><div className="bg-slate-900 border border-purple-500/50 rounded-2xl p-6 max-w-md w-full relative"><button onClick={() => setShowStep1HelpModal(false)} className="absolute top-4 right-4 text-slate-400">✕</button><h3 className="text-lg font-bold text-purple-300 mb-4">🔰 印の意味</h3><div className="space-y-3 text-xs text-slate-300"><p>◎◯▲：1〜3頭目にセット</p><p>△：2〜3頭目にセット</p><p>☆：3頭目のみセット</p></div><button onClick={() => setShowStep1HelpModal(false)} className="mt-6 w-full bg-purple-700 py-3 rounded-lg font-bold">閉じる</button></div></div>}

{showAdminModal && (
<div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
<div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-md w-full relative">
<button onClick={() => setShowAdminModal(false)} className="absolute top-4 right-4 text-slate-400">✕</button>
<h3 className="text-lg font-bold text-white mb-4">管理者専用：ターゲット同期</h3>
<input type="text" placeholder="URLまたは12桁IDを入力" value={tempUrlInput} onChange={(e) => setTempUrlInput(e.target.value)} className="glass-input w-full p-3 rounded-lg text-sm text-white mb-4" />
<button onClick={() => {
let id = targetRaceId, type = raceType;
if (tempUrlInput.includes("race_id=")) {
id = tempUrlInput.split("race_id=")[1].split("&")[0];
type = tempUrlInput.includes("shutuba.html") ? "shutuba" : "result";
} else if (tempUrlInput.length === 12) { id = tempUrlInput; }
setTargetRaceId(id);
setRaceType(type);
localStorage.setItem('targetRaceId', id);
localStorage.setItem('raceType', type);
setShowAdminModal(false);
setTempUrlInput("");
fetchLatestOdds(id, type, false);
}} className="w-full bg-purple-700 py-3 rounded-lg font-bold transition-colors">URL同期を実行</button>
</div>
</div>
)}
</div>
);
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
